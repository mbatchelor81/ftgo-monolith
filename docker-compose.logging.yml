# =============================================================================
# FTGO EFK Stack — Local Development
# =============================================================================
# Elasticsearch + Fluentd + Kibana for centralized log aggregation.
# Usage: docker compose -f docker-compose.logging.yml up -d
# =============================================================================

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: ftgo-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ftgo-logging

  fluentd:
    build:
      context: ./deployment/logging/fluentd
    container_name: ftgo-fluentd
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    volumes:
      - ./deployment/logging/fluentd/conf:/fluentd/etc
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ftgo-logging

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: ftgo-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - ftgo-logging

volumes:
  elasticsearch-data:
    driver: local

networks:
  ftgo-logging:
    driver: bridge

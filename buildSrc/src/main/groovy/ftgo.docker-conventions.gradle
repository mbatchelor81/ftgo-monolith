// =============================================================================
// ftgo.docker-conventions — Docker image build with Jib
// =============================================================================
// Configures Google Jib for building optimized, layered Docker images
// without requiring a local Docker daemon.
//
// Usage:
//   plugins {
//       id 'ftgo.docker-conventions'
//   }
//
// Build image:  ./gradlew :services:ftgo-order-service:jibDockerBuild
// Push image:   ./gradlew :services:ftgo-order-service:jib
// =============================================================================

plugins {
    id 'ftgo.java-conventions'
    id 'com.google.cloud.tools.jib'
}

jib {
    from {
        image = 'eclipse-temurin:17-jre-alpine'
    }
    to {
        image = "ftgo/${project.name}"
        tags = ['latest', project.version.toString()]
    }
    container {
        jvmFlags = [
            '-XX:+UseContainerSupport',
            '-XX:MaxRAMPercentage=75.0',
            '-Djava.security.egd=file:/dev/./urandom',
        ]
        ports = ['8080']
        creationTime = 'USE_CURRENT_TIMESTAMP'
        format = 'OCI'
        labels = [
            'maintainer': 'ftgo-team',
            'org.opencontainers.image.source': 'https://github.com/mbatchelor81/ftgo-monolith',
        ]
    }
}

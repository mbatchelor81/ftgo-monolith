spring:
  application:
    name: ftgo-restaurant-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ftgo_restaurant_service
    username: ${DB_USERNAME:ftgo}
    password: ${DB_PASSWORD:ftgo}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: public
    validate-migration-naming: true
  security:
    user:
      name: ${SECURITY_USER_NAME:admin}
      password: ${SECURITY_USER_PASSWORD:}
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db,diskSpace
        liveness:
          include: livenessState,serviceLiveness
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: b3_multi
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

ftgo:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allow-credentials: false
      max-age: 3600
    jwt:
      issuer: ${JWT_ISSUER:ftgo-platform}
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:30m}
      refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:7d}
  openapi:
    title: FTGO Restaurant Service API
    description: Manages restaurant registration, menus, and order acceptance
    version: v1
  discovery:
    namespace: ${K8S_NAMESPACE:ftgo}
    cluster-domain: ${K8S_CLUSTER_DOMAIN:svc.cluster.local}
    default-port: 8080
    services:
      ftgo-order-service: ${ORDER_SERVICE_URL:http://localhost:8081}
  resilience:
    circuit-breaker:
      failure-rate-threshold: 50
      sliding-window-size: 10
      minimum-number-of-calls: 5
      wait-duration-in-open-state-seconds: 30
      permitted-number-of-calls-in-half-open-state: 3
    retry:
      max-attempts: 3
      initial-interval-millis: 1000
      multiplier: 2.0
    bulkhead:
      max-concurrent-calls: 25
      max-wait-duration-millis: 500
    rate-limiter:
      limit-for-period: 50
      limit-refresh-period-seconds: 1
      timeout-duration-millis: 500

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

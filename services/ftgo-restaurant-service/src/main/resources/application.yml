server:
  port: 8083

spring:
  application:
    name: ftgo-restaurant-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/ftgo_restaurant_service
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:rootpassword}
    driver-class-name: com.mysql.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

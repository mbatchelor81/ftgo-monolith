spring:
  application:
    name: ftgo-restaurant-service
  datasource:
    url: jdbc:mysql://localhost:3306/ftgo_restaurant_service
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: com.mysql.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ftgoDiskSpace
        readiness:
          include: readinessState,ftgoDatabase,restaurantManagement

logging:
  level:
    com.ftgo.restaurant: INFO
    org.springframework: WARN
    io.github.resilience4j: INFO

# --- Service Discovery ---
ftgo:
  service-discovery:
    namespace: ${FTGO_NAMESPACE:ftgo}

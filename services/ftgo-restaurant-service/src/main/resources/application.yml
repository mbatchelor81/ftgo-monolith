server:
  port: 8083

spring:
  application:
    name: ftgo-restaurant-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/ftgo_restaurant_service
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

ftgo:
  tracing:
    service-name: ${spring.application.name}
    zipkin-endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
    sampling-rate: ${TRACING_SAMPLING_RATE:1.0}
    propagation-type: B3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_RATE:1.0}

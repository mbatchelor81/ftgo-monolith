spring:
  application:
    name: ftgo-courier-service
  datasource:
    url: jdbc:mysql://localhost:3306/ftgo_courier_service
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: com.mysql.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# --- SpringDoc OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

ftgo:
  api:
    title: FTGO Courier Service
    description: Manages courier availability and delivery scheduling
    version: 1.0.0

logging:
  level:
    com.ftgo.courier: INFO
    org.springframework: WARN

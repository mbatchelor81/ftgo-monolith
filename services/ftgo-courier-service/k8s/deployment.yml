apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-courier-service
  labels:
    app: ftgo-courier-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ftgo-courier-service
  template:
    metadata:
      labels:
        app: ftgo-courier-service
    spec:
      containers:
        - name: ftgo-courier-service
          image: ftgo/courier-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: ftgo-config
                  key: mysql-host
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: ftgo-config
                  key: mysql-port
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-credentials
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-credentials
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ftgo-courier-service
spec:
  selector:
    app: ftgo-courier-service
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
  type: ClusterIP

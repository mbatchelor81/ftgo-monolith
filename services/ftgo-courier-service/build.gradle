// ftgo-courier-service — Microservice build configuration
// Migrated from monolith module: ftgo-courier-service

apply plugin: FtgoMicroservicePlugin

// NOTE: bootJar is disabled by default in FtgoMicroservicePlugin.
// Re-enable it once this service has a @SpringBootApplication main class:
//   bootJar { enabled = true }
//   jar { enabled = false }

dependencies {
    implementation project(":services:ftgo-courier-service-api")
    implementation project(":shared:ftgo-domain")
    implementation project(":shared:ftgo-common")
    implementation project(":shared:common-swagger")

    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation libs.micrometer.prometheus
}

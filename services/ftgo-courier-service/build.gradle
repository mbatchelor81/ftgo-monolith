// ftgo-courier-service — Microservice build configuration
// Migrated from monolith module: ftgo-courier-service

apply plugin: FtgoMicroservicePlugin

dependencies {
    implementation project(":services:ftgo-courier-service-api")
    implementation project(":shared:ftgo-domain")
    implementation project(":shared:ftgo-common")
    implementation project(":shared:common-swagger")

    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation libs.micrometer.prometheus
}

plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.testing-conventions'
    id 'ftgo.docker-conventions'
}

version = '0.0.1-SNAPSHOT'

dependencies {
    implementation project(':shared-ftgo-common')
    implementation project(':shared-ftgo-domain')
    implementation project(':shared-ftgo-security-lib')
    implementation project(':shared-ftgo-metrics-lib')
    implementation project(':shared-ftgo-openapi-lib')
    implementation project(':services-ftgo-courier-service-api')

    implementation libs.bundles.spring.boot.service
    runtimeOnly libs.mysql.connector
}

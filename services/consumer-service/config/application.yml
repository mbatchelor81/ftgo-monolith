spring:
  application:
    name: consumer-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ftgo_consumer}
    username: ${DB_USER:ftgo}
    password: ${DB_PASSWORD:ftgo}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Resilience4j is bundled by the ftgo-resilience library; Spring Cloud
  # Circuit Breaker / LoadBalancer auto-configuration is disabled so the
  # service never reaches for Eureka or Consul — service discovery is
  # pure Kubernetes DNS (see `ftgo.services.*` below).
  cloud:
    discovery:
      enabled: false
    loadbalancer:
      enabled: false

server:
  port: 8080
  # Spring Boot stops accepting new requests then drains in-flight ones;
  # the K8s preStop hook + terminationGracePeriodSeconds complete the
  # graceful-shutdown contract so rolling deploys never drop a request.
  shutdown: graceful

# Actuator is bound to a separate management port (9090) so the
# Prometheus / health surface area is NEVER reachable from the public
# service port. See platform/observability/README.md for the network-level
# hardening checklist (Kubernetes NetworkPolicy / security groups).
spring.lifecycle:
  timeout-per-shutdown-phase: 25s
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9090}
  # ------------------------------------------------------------------
  # Distributed tracing (EM-42). Micrometer Tracing + Brave bridge ship
  # spans to Zipkin; W3C Trace Context and B3 propagation are both on so
  # traces survive hops through the Spring Cloud Gateway (W3C) and any
  # legacy B3-emitting clients. Sampling is 100% by default so local dev
  # always shows full traces; the `prod` profile at the bottom of this
  # file lowers it to 10% and MANAGEMENT_TRACING_SAMPLING_PROBABILITY
  # allows per-environment overrides.
  # ------------------------------------------------------------------
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: W3C,B3
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        # `health` and `health/liveness`/`health/readiness` back the K8s
        # probes; `info` feeds build metadata; `prometheus` powers
        # /actuator/prometheus; `circuitbreakers`/`retries`/`bulkheads`
        # expose Resilience4j internals for debugging.
        include: health,info,prometheus,metrics,circuitbreakers,retries,bulkheads
  endpoint:
    health:
      probes:
        # Serves /actuator/health/liveness and /actuator/health/readiness.
        enabled: true
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
      show-components: always
      group:
        # Readiness rolls up every dependent-service health indicator
        # registered by libs/ftgo-resilience so a broken downstream
        # service removes this pod from the K8s load balancer.
        readiness:
          include: readinessState,db,diskSpace,dependentServices
        liveness:
          # Liveness stays intentionally narrow — only the JVM itself.
          include: livenessState
  health:
    diskspace:
      enabled: true
    db:
  metrics:
    tags:
      application: consumer-service
      bounded-context: consumer
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 250ms, 500ms, 1s, 2s

# ------------------------------------------------------------------
# Resilience4j — circuit breaker, retry (exponential backoff), bulkhead
# (thread-pool isolation), time limiter. The `default` instance below
# is applied to every outbound call; per-downstream instances inherit
# from it via `baseConfig` and can tune limits independently.
# ------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientResponseException$InternalServerError
          - org.springframework.web.reactive.function.client.WebClientRequestException
    instances:
      default:
        baseConfig: default
      order-service:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        exponentialMaxWaitDuration: 5s
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
    instances:
      default:
        baseConfig: default
      order-service:
        baseConfig: default
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 25
        maxWaitDuration: 100ms
    instances:
      default:
        baseConfig: default
      order-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
        cancelRunningFuture: true
    instances:
      default:
        baseConfig: default
      order-service:
        baseConfig: default

# ------------------------------------------------------------------
# Kubernetes-native service discovery. Every outbound URL is a cluster
# DNS name of the form `<service>.<namespace>.svc.cluster.local` so pods
# resolve peers through the standard kube-dns/CoreDNS path — no Eureka
# client on the classpath, no Consul agent.
#
# `ftgo.resilience.dependent-services` lists the services whose health
# is rolled up into this pod's readiness probe (see libs/ftgo-resilience
# DependentServiceHealthIndicator).
# ------------------------------------------------------------------
ftgo:
  services:
    order-service:
      base-url: ${FTGO_ORDER_SERVICE_URL:http://order-service.ftgo.svc.cluster.local:8080}
      health-path: /actuator/health
  resilience:
    default-instance-name: default
    dependent-services:
      # Consumer service currently has no hard runtime dependency on
      # other services; listing order-service as advisory so operational
      # dashboards surface cross-service health without failing
      # readiness when order-service is briefly unavailable.
      - order-service
  # OpenAPI 3.0 metadata consumed by the shared `libs:ftgo-openapi` library.
  # Keys are bound to `OpenApiProperties` (prefix `ftgo.openapi`).
  openapi:
    title: "FTGO Consumer Service API"
    description: >
      Manages consumer registration, profile lookup, and per-consumer order
      validation rules. See the FTGO REST API standards for shared
      conventions (URL naming, status codes, pagination, dates).
    version: "1.0.0"
    contact:
      name: "FTGO Consumer Team"
      email: "consumer-team@ftgo.example.com"
      url: "https://github.com/mbatchelor81/ftgo-monolith/tree/master/services/consumer-service"

# ------------------------------------------------------------------
# Logging (EM-49). Profile-aware appenders live in logback-ftgo.xml
# (shared from libs:ftgo-logging). This block only tunes Spring Boot's
# logger registry — output format/rotation is chosen by profile in XML.
#
# Defaults apply to local dev; the `dev`, `staging`, and `prod` profile
# documents further down raise framework loggers per EM-49 acceptance
# criteria (Local: DEBUG/INFO, Dev+Staging: INFO/WARN, Prod: INFO/ERROR).
# ------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.ftgo.consumer: DEBUG
    net.chrisrichardson.ftgo: DEBUG
    net.chrisrichardson.ftgo.resilience: INFO
    io.github.resilience4j: INFO
    org.springframework: INFO
    org.hibernate: INFO
# SpringDoc Swagger UI is served at /swagger-ui.html and the OpenAPI JSON
# at /v3/api-docs by default — no extra configuration needed here.

---
# Dev / Staging profile overrides. INFO on application code, WARN on
# framework noise.
spring:
  config:
    activate:
      on-profile: dev | staging
logging:
  level:
    root: INFO
    com.ftgo.consumer: INFO
    net.chrisrichardson.ftgo: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN

---
# Production profile overrides. Spring Boot loads this additional document
# only when `spring.profiles.active` contains `prod`. Tracing overhead on a
# high-throughput service is non-trivial, so we sample 10% of requests per
# the EM-42 acceptance criteria; operators can tune
# MANAGEMENT_TRACING_SAMPLING_PROBABILITY per-deployment without a rebuild.
# Framework loggers drop to ERROR so the Elasticsearch ingestion bill stays
# predictable (EM-49).
spring:
  config:
    activate:
      on-profile: prod
management:
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}
logging:
  level:
    root: INFO
    com.ftgo.consumer: INFO
    net.chrisrichardson.ftgo: INFO
    org.springframework: ERROR
    org.hibernate: ERROR
    org.hibernate.SQL: ERROR
    com.zaxxer.hikari: ERROR

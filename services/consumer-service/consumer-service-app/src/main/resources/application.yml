server:
  port: 8080

spring:
  application:
    name: consumer-service
  datasource:
    url: jdbc:mysql://localhost:3306/ftgo
    username: ftgo_user
    password: ftgo_password
    driver-class-name: com.mysql.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

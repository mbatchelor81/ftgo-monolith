apply plugin: 'java-library'
apply plugin: 'maven-publish'

group = 'com.ftgo'
version = '1.0.0'
sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    // JPA API for @Embeddable annotations on value objects
    compileOnly 'jakarta.persistence:jakarta.persistence-api:3.1.0'

    // Jackson for Money serialization/deserialization
    api 'com.fasterxml.jackson.core:jackson-databind:2.9.7'
    api 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.9.7'

    // Apache Commons Lang for equals/hashCode/toString builders
    api 'commons-lang:commons-lang:2.6'

    // Jakarta annotations for @PostConstruct
    implementation 'jakarta.annotation:jakarta.annotation-api:2.1.1'

    // Spring context for @Configuration, @Bean
    implementation 'org.springframework:spring-context:6.1.6'
    implementation 'org.springframework:spring-beans:6.1.6'

    // Test dependencies
    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.2.5'
    testImplementation 'jakarta.persistence:jakarta.persistence-api:3.1.0'
}

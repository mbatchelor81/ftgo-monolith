plugins {
    id 'ftgo.library-conventions'
}

version = '1.0.0'

dependencies {
    // JPA API for @Embeddable annotations on value objects (javax.persistence)
    compileOnly 'javax.persistence:javax.persistence-api:2.2'

    // javax.annotation.PostConstruct (removed from JDK 11+)
    implementation 'javax.annotation:javax.annotation-api:1.3.2'

    // Jackson for Money serialization/deserialization
    api libs.jackson.databind
    api libs.jackson.datatype.jsr310

    // Apache Commons Lang for equals/hashCode/toString builders
    implementation 'commons-lang:commons-lang:2.6'

    // Spring context for @Configuration, @Bean, @PostConstruct
    implementation libs.spring.boot.starter.web

    // JUnit 4 support for legacy tests (via vintage engine in spring-boot-starter-test)
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'javax.persistence:javax.persistence-api:2.2'
}

plugins {
    id 'ftgo.library-conventions'
}

group = 'com.ftgo'
version = '1.0.0'

dependencies {
    // JPA API for @Embeddable annotations on value objects
    compileOnly 'jakarta.persistence:jakarta.persistence-api'

    // Jakarta Annotation API for @PostConstruct
    implementation 'jakarta.annotation:jakarta.annotation-api:2.1.1'

    // Jackson for Money serialization/deserialization
    api libs.jackson.databind
    api libs.jackson.datatype.jsr310

    // Apache Commons Lang for equals/hashCode/toString builders
    api "org.apache.commons:commons-lang3:${libs.versions.commons.lang3.get()}"

    // Spring context for @Configuration, @Bean
    implementation 'org.springframework:spring-context'

    // Test dependencies (junit, mockito, assertj provided by testing-conventions)
    testImplementation 'jakarta.persistence:jakarta.persistence-api'
}

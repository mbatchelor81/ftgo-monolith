apply plugin: 'java-library'
apply plugin: 'maven-publish'


group = 'com.ftgo'
version = '1.0.0'
sourceCompatibility = '1.8'
targetCompatibility = '1.8'

repositories {
    mavenCentral()
}

dependencies {
    // JPA API for @Embeddable annotations on value objects
    compileOnly 'javax.persistence:javax.persistence-api:2.2'

    // Jackson for Money serialization/deserialization
    compile 'com.fasterxml.jackson.core:jackson-databind:2.9.7'
    compile 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.9.7'

    // Apache Commons Lang for equals/hashCode/toString builders
    implementation 'commons-lang:commons-lang:2.6'

    // Spring context for @Configuration, @Bean, @PostConstruct
    implementation "org.springframework:spring-context:5.0.7.RELEASE"
    implementation "org.springframework:spring-beans:5.0.7.RELEASE"

    // Test dependencies
    testImplementation "org.springframework.boot:spring-boot-starter-test"
    testImplementation 'javax.persistence:javax.persistence-api:2.2'
}

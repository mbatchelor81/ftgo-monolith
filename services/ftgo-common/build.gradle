plugins {
    id 'ftgo.library-conventions'
}

apply plugin: 'maven-publish'

group = 'com.ftgo'
version = '1.0.0'

dependencies {
    // JPA API for @Embeddable annotations on value objects
    compileOnly 'javax.persistence:javax.persistence-api:2.2'

    // Jackson for Money serialization/deserialization
    api libs.jackson.databind
    api libs.jackson.datatype.jsr310

    // Apache Commons Lang for equals/hashCode/toString builders
    compile 'commons-lang:commons-lang:2.6'

    // Spring context for @Configuration, @Bean, @PostConstruct
    compile "org.springframework:spring-context:5.0.7.RELEASE"
    compile "org.springframework:spring-beans:5.0.7.RELEASE"

    // Test dependencies
    testCompile "org.springframework.boot:spring-boot-starter-test:$springBootVersion"
    testCompile 'javax.persistence:javax.persistence-api:2.2'
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            pom {
                name = 'FTGO Common Library'
                description = 'Cross-cutting value objects and utilities for FTGO microservices'
            }
        }
    }

    repositories {
        maven {
            name = 'local'
            url = "${buildDir}/repo"
        }
    }
}

plugins {
    id 'ftgo.library-conventions'
}

version = '1.0.0'

dependencies {
    // JPA API for @Embeddable annotations on value objects
    compileOnly 'jakarta.persistence:jakarta.persistence-api'

    // Jackson for Money serialization/deserialization
    api libs.jackson.databind
    api libs.jackson.datatype.jsr310

    // Apache Commons Lang for equals/hashCode/toString builders
    implementation 'org.apache.commons:commons-lang3'

    // Spring context for @Configuration, @Bean, @PostConstruct
    implementation libs.spring.boot.starter.web
}

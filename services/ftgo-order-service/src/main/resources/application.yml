spring:
  application:
    name: ftgo-order-service
  datasource:
    url: jdbc:mysql://localhost:3306/ftgo_order_service
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: com.mysql.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: w3c,b3
    enabled: true
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ftgoDiskSpace
        readiness:
          include: readinessState,ftgoDatabase,orderProcessing
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s
  prometheus:
    metrics:
      export:
        enabled: true

# --- SpringDoc OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

ftgo:
  api:
    title: FTGO Order Service
    description: Manages order lifecycle — creation, revision, acceptance, preparation, and delivery
    version: 1.0.0

# --- SpringDoc OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

ftgo:
  api:
    title: FTGO Order Service
    description: Manages order lifecycle — creation, revision, acceptance, preparation, and delivery
    version: 1.0.0

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    com.ftgo.order: INFO
    org.springframework: WARN
    io.github.resilience4j: INFO

# --- Resilience4j overrides (service-specific) ---
resilience4j:
  circuitbreaker:
    instances:
      restaurantService:
        baseConfig: default
      consumerService:
        baseConfig: default
  retry:
    instances:
      restaurantService:
        baseConfig: default
      consumerService:
        baseConfig: default
  bulkhead:
    instances:
      restaurantService:
        baseConfig: default
      consumerService:
        baseConfig: default

# --- Service Discovery ---
ftgo:
  service-discovery:
    namespace: ${FTGO_NAMESPACE:ftgo}

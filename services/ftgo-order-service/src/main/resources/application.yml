spring:
  application:
    name: ftgo-order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ftgo_order_service
    username: ${DB_USERNAME:ftgo}
    password: ${DB_PASSWORD:ftgo}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

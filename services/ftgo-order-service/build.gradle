plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.testing-conventions'
    id 'ftgo.docker-conventions'
    id 'ftgo.observability-conventions'
}

// Enable Spring Boot executable fat jar (overrides convention default for placeholder services)
tasks.named('bootJar') { enabled = true }
tasks.named('jar') { enabled = false }

dependencies {
    implementation project(':ftgo-common')
    implementation project(':ftgo-security-lib')
    implementation project(':ftgo-openapi-lib')

    implementation libs.spring.boot.starter.web
    implementation libs.spring.boot.starter.data.jpa
    implementation libs.spring.boot.starter.actuator
    implementation libs.spring.boot.starter.validation

    runtimeOnly libs.postgresql
    runtimeOnly libs.flyway.database.postgresql

    testImplementation libs.spring.security.test
    testImplementation project(':ftgo-test-lib')
}

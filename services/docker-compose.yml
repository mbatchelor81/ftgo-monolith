version: "3.8"

# ---------------------------------------------------------------------------
# FTGO Microservices - Local Development Docker Compose
#
# Usage:
#   cd services/
#   docker compose up -d                     # Start all services
#   docker compose up -d consumer-service    # Start a single service + deps
#   docker compose logs -f order-service     # Tail logs for one service
#   docker compose down -v                   # Stop and remove volumes
#
# Build images locally:
#   docker compose build                     # Build all service images
#   docker compose build consumer-service    # Build a single service
# ---------------------------------------------------------------------------

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - ftgo-network
  environment: &common-env
    SPRING_PROFILES_ACTIVE: docker
    DB_USERNAME: ftgo
    DB_PASSWORD: ftgo
  logging:
    driver: fluentd
    options:
      fluentd-address: localhost:24224
      fluentd-async: "true"
      tag: docker.{{.Name}}
  healthcheck:
    test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/liveness"]
    interval: 15s
    timeout: 5s
    start_period: 30s
    retries: 3

services:
  # -------------------------------------------------------------------------
  # Infrastructure
  # -------------------------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "9411:9411"
    networks:
      - ftgo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ftgo
      POSTGRES_PASSWORD: ftgo
      POSTGRES_MULTIPLE_DATABASES: ftgo_consumer_service,ftgo_order_service,ftgo_restaurant_service,ftgo_courier_service
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    networks:
      - ftgo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ftgo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # EFK Stack (Elasticsearch + Fluentd + Kibana) — Centralized Logging
  # -------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - ftgo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5

  fluentd:
    build:
      context: ../deployment/efk/fluentd
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    volumes:
      - fluentd-buffer:/var/log/fluentd-buffers
    environment:
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: "9200"
    networks:
      - ftgo-network
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - ftgo-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5

  # -------------------------------------------------------------------------
  # Microservices
  # -------------------------------------------------------------------------
  consumer-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/ftgo-consumer-service/Dockerfile
    image: ghcr.io/mbatchelor81/ftgo/ftgo-consumer-service:local
    ports:
      - "8081:8080"
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ftgo_consumer_service
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      fluentd:
        condition: service_started

  order-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/ftgo-order-service/Dockerfile
    image: ghcr.io/mbatchelor81/ftgo/ftgo-order-service:local
    ports:
      - "8082:8080"
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ftgo_order_service
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      fluentd:
        condition: service_started

  restaurant-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/ftgo-restaurant-service/Dockerfile
    image: ghcr.io/mbatchelor81/ftgo/ftgo-restaurant-service:local
    ports:
      - "8083:8080"
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ftgo_restaurant_service
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      fluentd:
        condition: service_started

  courier-service:
    <<: *service-defaults
    build:
      context: ..
      dockerfile: services/ftgo-courier-service/Dockerfile
    image: ghcr.io/mbatchelor81/ftgo/ftgo-courier-service:local
    ports:
      - "8084:8080"
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ftgo_courier_service
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACING_SAMPLING_PROBABILITY: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      fluentd:
        condition: service_started

volumes:
  postgres-data:
  elasticsearch-data:
  fluentd-buffer:

networks:
  ftgo-network:
    driver: bridge

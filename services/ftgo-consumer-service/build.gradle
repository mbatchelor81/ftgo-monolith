// ftgo-consumer-service — Microservice build configuration
// Migrated from monolith module: ftgo-consumer-service

apply plugin: FtgoMicroservicePlugin

// NOTE: bootJar is disabled by default in FtgoMicroservicePlugin.
// Re-enable it once this service has a @SpringBootApplication main class:
//   bootJar { enabled = true }
//   jar { enabled = false }

dependencies {
    implementation project(":services:ftgo-consumer-service-api")
    implementation project(":shared:ftgo-domain")
    implementation project(":shared:ftgo-common")
    implementation project(":shared:common-swagger")
    implementation project(":shared:ftgo-resilience-lib")

    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-aop'
    implementation libs.micrometer.prometheus

    testImplementation project(":shared:ftgo-test-util")
}

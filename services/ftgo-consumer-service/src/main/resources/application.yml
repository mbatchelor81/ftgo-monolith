spring:
  application:
    name: ftgo-consumer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ftgo_consumer_service
    username: ${DB_USERNAME:ftgo}
    password: ${DB_PASSWORD:ftgo}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: public
    validate-migration-naming: true
  security:
    user:
      name: ${SECURITY_USER_NAME:admin}
      password: ${SECURITY_USER_PASSWORD:}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: b3_multi
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

ftgo:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allow-credentials: false
      max-age: 3600
    jwt:
      issuer: ${JWT_ISSUER:ftgo-platform}
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:30m}
      refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:7d}
  openapi:
    title: FTGO Consumer Service API
    description: Manages consumer registration and validation
    version: v1

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

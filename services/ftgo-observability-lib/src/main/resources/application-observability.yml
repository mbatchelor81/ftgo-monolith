# Shared observability defaults for all FTGO microservices.
# Each service activates this profile by including 'observability' in its
# spring.profiles.active list (or via SPRING_PROFILES_ACTIVE env var).

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      # Ensures every metric carries the service name as a label
      application: ${spring.application.name:unknown}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s
    enable:
      jvm: true
      system: true
      process: true
      http: true
  prometheus:
    metrics:
      export:
        enabled: true

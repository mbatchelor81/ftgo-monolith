spring:
  application:
    name: courier-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ftgo_courier}
    username: ${DB_USER:ftgo}
    password: ${DB_PASSWORD:ftgo}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: courier-service
      bounded-context: courier

logging:
  level:
    root: INFO
    com.ftgo.courier: INFO

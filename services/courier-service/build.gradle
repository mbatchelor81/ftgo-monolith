//
// services/courier-service
// ------------------------
// Deployable Courier microservice. Applies the canonical FTGO convention
// plugin stack (see services/consumer-service/build.gradle for the
// rationale). Business code will land under
// src/main/java/com/ftgo/courier during the EM-3x code extraction work.
//

plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.testing-conventions'
    id 'ftgo.docker-conventions'
}

description = 'FTGO Courier microservice'

dependencies {
    implementation project(':libs:ftgo-security')

    implementation libs.bundles.spring.boot.web
    implementation libs.bundles.spring.boot.data.jpa

    testImplementation libs.bundles.security.testing
}

spring:
  application:
    name: ftgo-SERVICENAME-test
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.testcontainers: INFO
    com.ftgo: DEBUG

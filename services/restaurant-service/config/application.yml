spring:
  application:
    name: restaurant-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ftgo_restaurant}
    username: ${DB_USER:ftgo}
    password: ${DB_PASSWORD:ftgo}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: restaurant-service
      bounded-context: restaurant

ftgo:
  openapi:
    title: "FTGO Restaurant Service API"
    description: >
      Manages restaurant registration, menu catalog, and menu revisions.
      See the FTGO REST API standards for shared conventions.
    version: "1.0.0"
    contact:
      name: "FTGO Restaurant Team"
      email: "restaurant-team@ftgo.example.com"
      url: "https://github.com/mbatchelor81/ftgo-monolith/tree/master/services/restaurant-service"

logging:
  level:
    root: INFO
    com.ftgo.restaurant: INFO

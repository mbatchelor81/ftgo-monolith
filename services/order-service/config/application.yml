spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ftgo_order}
    username: ${DB_USER:ftgo}
    password: ${DB_PASSWORD:ftgo}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: order-service
      bounded-context: order

logging:
  level:
    root: INFO
    com.ftgo.order: INFO

# OpenAPI 3.0 metadata consumed by the shared `libs:ftgo-openapi` library.
# Keys are bound to `OpenApiProperties` (prefix `ftgo.openapi`).
ftgo:
  openapi:
    title: "FTGO Order Service API"
    description: >
      Manages the order lifecycle — create, revise, cancel, accept, prepare,
      pick up, and deliver. Owns the order state machine and coordinates
      with the consumer, restaurant, and courier services.
    version: "1.0.0"
    contact:
      name: "FTGO Order Team"
      email: "order-team@ftgo.example.com"
      url: "https://github.com/mbatchelor81/ftgo-monolith/tree/master/services/order-service"

# SpringDoc Swagger UI is served at /swagger-ui.html and the OpenAPI JSON
# at /v3/api-docs by default — no extra configuration needed here.

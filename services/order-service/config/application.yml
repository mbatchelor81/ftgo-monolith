spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ftgo_order}
    username: ${DB_USER:ftgo}
    password: ${DB_PASSWORD:ftgo}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Resilience4j is bundled by the ftgo-resilience library; Spring Cloud
  # Circuit Breaker / LoadBalancer auto-configuration is disabled so the
  # service never reaches for Eureka or Consul — service discovery is
  # pure Kubernetes DNS (see `ftgo.services.*` below).
  cloud:
    discovery:
      enabled: false
    loadbalancer:
      enabled: false

server:
  port: 8080
  # Spring Boot stops accepting new requests then drains in-flight ones;
  # the K8s preStop hook + terminationGracePeriodSeconds complete the
  # graceful-shutdown contract so rolling deploys never drop a request.
  shutdown: graceful

# Actuator is bound to a separate management port (9090) so the
# Prometheus / health surface area is NEVER reachable from the public
# service port. Operators are expected to firewall 9090 at the network
# layer (Kubernetes NetworkPolicy or security group) and only expose it
# to Prometheus, Grafana Agent, or the kubelet probes.
#
# See platform/observability/README.md for the full hardening checklist.
spring.lifecycle:
  timeout-per-shutdown-phase: 25s
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9090}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        # `health` and `health/liveness`/`health/readiness` back the K8s
        # probes; `info` feeds build metadata; `prometheus` powers
        # /actuator/prometheus; `circuitbreakers`/`retries`/`bulkheads`
        # expose Resilience4j internals for debugging.
        include: health,info,prometheus,metrics,circuitbreakers,retries,bulkheads
  endpoint:
    health:
      probes:
        # Serves /actuator/health/liveness and /actuator/health/readiness.
        enabled: true
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
      show-components: always
      group:
        # Readiness rolls up every dependent-service health indicator
        # registered by libs/ftgo-resilience so a broken downstream
        # service removes this pod from the K8s load balancer.
        readiness:
          include: readinessState,db,diskSpace,dependentServices
        liveness:
          # Liveness stays intentionally narrow — only the JVM itself.
          include: livenessState
  health:
    diskspace:
      enabled: true
    db:
  metrics:
    tags:
      application: order-service
      bounded-context: order
    distribution:
      percentiles-histogram:
        http.server.requests: true
        orders.processing.time: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        orders.processing.time: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 250ms, 500ms, 1s, 2s

# ------------------------------------------------------------------
# Resilience4j — circuit breaker, retry (exponential backoff), bulkhead
# (thread-pool isolation), time limiter. Per-instance blocks tune each
# downstream dependency independently; all inherit from `default` via
# `baseConfig`.
# ------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientResponseException$InternalServerError
          - org.springframework.web.reactive.function.client.WebClientRequestException
    instances:
      default:
        baseConfig: default
      consumer-service:
        baseConfig: default
      restaurant-service:
        baseConfig: default
      courier-service:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        exponentialMaxWaitDuration: 5s
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
    instances:
      default:
        baseConfig: default
      consumer-service:
        baseConfig: default
      restaurant-service:
        baseConfig: default
      courier-service:
        baseConfig: default
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 25
        maxWaitDuration: 100ms
    instances:
      default:
        baseConfig: default
      consumer-service:
        baseConfig: default
      restaurant-service:
        baseConfig: default
      courier-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
        cancelRunningFuture: true
    instances:
      default:
        baseConfig: default
      consumer-service:
        baseConfig: default
      restaurant-service:
        baseConfig: default
      courier-service:
        baseConfig: default

# ------------------------------------------------------------------
# Kubernetes-native service discovery. The order-service is the central
# orchestrator and so reaches into every other bounded context; each
# base URL is an in-cluster DNS name (`<service>.<namespace>.svc.cluster.local`)
# with an environment-variable override for docker-compose / local runs.
# ------------------------------------------------------------------
ftgo:
  services:
    consumer-service:
      base-url: ${FTGO_CONSUMER_SERVICE_URL:http://consumer-service.ftgo.svc.cluster.local:8080}
      health-path: /actuator/health
    restaurant-service:
      base-url: ${FTGO_RESTAURANT_SERVICE_URL:http://restaurant-service.ftgo.svc.cluster.local:8080}
      health-path: /actuator/health
    courier-service:
      base-url: ${FTGO_COURIER_SERVICE_URL:http://courier-service.ftgo.svc.cluster.local:8080}
      health-path: /actuator/health
  resilience:
    default-instance-name: default
    # Every service the order flow touches on the critical path. A broken
    # dependency here surfaces as DOWN in /actuator/health/readiness and
    # K8s removes the pod from the Service endpoints.
    dependent-services:
      - consumer-service
      - restaurant-service
      - courier-service

logging:
  level:
    root: INFO
    com.ftgo.order: INFO
    net.chrisrichardson.ftgo.resilience: INFO
    io.github.resilience4j: INFO

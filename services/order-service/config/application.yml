spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ftgo_order}
    username: ${DB_USER:ftgo}
    password: ${DB_PASSWORD:ftgo}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  shutdown: graceful

# Actuator is bound to a separate management port (9090) so the
# Prometheus / health surface area is NEVER reachable from the public
# service port. Operators are expected to firewall 9090 at the network
# layer (Kubernetes NetworkPolicy or security group) and only expose it
# to Prometheus, Grafana Agent, or the kubelet probes.
#
# See platform/observability/README.md for the full hardening checklist.
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9090}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: order-service
      bounded-context: order
    distribution:
      percentiles-histogram:
        http.server.requests: true
        orders.processing.time: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        orders.processing.time: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 250ms, 500ms, 1s, 2s

logging:
  level:
    root: INFO
    com.ftgo.order: INFO

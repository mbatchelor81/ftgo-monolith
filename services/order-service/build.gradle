//
// services/order-service
// ----------------------
// Deployable Order microservice. Applies the canonical FTGO convention
// plugin stack (see services/consumer-service/build.gradle for the
// rationale). Business code will land under
// src/main/java/com/ftgo/order during the EM-3x code extraction work.
//

plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.observability-conventions'
    id 'ftgo.testing-conventions'
    id 'ftgo.docker-conventions'
}

description = 'FTGO Order microservice'

dependencies {
    implementation project(':libs:ftgo-security')

    implementation libs.bundles.spring.boot.web
    implementation libs.bundles.spring.boot.data.jpa

    // Structured JSON logging + correlation-ID propagation (EM-43).
    implementation project(':libs:ftgo-logging')
    // EM-44: resilience (circuit breakers, retries, bulkheads), K8s-native
    // service discovery helpers, and shared health indicators.
    implementation project(':libs:ftgo-resilience')
    testImplementation libs.spring.boot.starter.test
    testImplementation libs.bundles.security.testing
}

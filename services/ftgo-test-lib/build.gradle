plugins {
    id 'ftgo.library-conventions'
}

group = 'com.ftgo'
version = '1.0.0'

dependencies {
    // Domain model access for builders
    api project(':ftgo-common')
    api project(':ftgo-domain')

    // Testing frameworks — exposed as API so consumers get them transitively
    api libs.junit.jupiter
    api libs.junit.jupiter.api
    api libs.assertj.core
    api libs.mockito.core
    api libs.mockito.junit.jupiter

    // Spring Boot Test support
    api libs.spring.boot.starter.test

    // Testcontainers for integration tests
    api libs.testcontainers.junit.jupiter
    api libs.testcontainers.postgresql

    // REST-Assured for API tests
    api libs.rest.assured

    // Database drivers for test containers
    api libs.postgresql
    api libs.h2
}

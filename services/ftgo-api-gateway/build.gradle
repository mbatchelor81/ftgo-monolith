// ftgo-api-gateway — Spring Cloud Gateway entry point for all microservices
// Jira: EM-38

plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.logging-conventions'
    id 'ftgo.testing-conventions'
    id 'ftgo.docker-conventions'
}

// Gateway has a @SpringBootApplication main class
bootJar { enabled = true }
jar { enabled = false }

ext {
    set('springCloudVersion', '2023.0.1')
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }
}

dependencies {
    // Spring Cloud Gateway (reactive, Netty-based)
    implementation 'org.springframework.cloud:spring-cloud-starter-gateway'

    // Resilience4j circuit breaker integration
    implementation 'org.springframework.cloud:spring-cloud-starter-circuitbreaker-reactor-resilience4j'

    // Redis-backed rate limiting
    implementation 'org.springframework.boot:spring-boot-starter-data-redis-reactive'

    // Actuator for health checks and metrics
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation libs.micrometer.prometheus

    // Distributed tracing — Micrometer Tracing with Brave + Zipkin
    implementation libs.bundles.tracing

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'io.projectreactor:reactor-test'
}

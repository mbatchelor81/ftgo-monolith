input {
  # Receive structured JSON logs from services via TCP.
  # Uses plain codec so raw JSON stays in [message] and goes through
  # the same filter parsing path as Beats input for consistent field names.
  tcp {
    port => 5000
    codec => line
    tags => ["ftgo-service"]
  }

  # Beats input for Filebeat-based log shipping
  beats {
    port => 5044
    tags => ["ftgo-filebeat"]
  }
}

filter {
  # Parse JSON-formatted log messages if not already parsed
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }

    if [parsed] {
      mutate {
        rename => {
          "[parsed][level]"         => "log_level"
          "[parsed][logger_name]"   => "logger"
          "[parsed][thread_name]"   => "thread"
          "[parsed][message]"       => "log_message"
          "[parsed][stack_trace]"   => "stack_trace"
          "[parsed][level_value]"   => "level_value"
          "[parsed][correlationId]" => "correlationId"
          "[parsed][traceId]"       => "traceId"
          "[parsed][spanId]"        => "spanId"
          "[parsed][serviceName]"   => "serviceName"
          "[parsed][httpMethod]"    => "httpMethod"
          "[parsed][requestUri]"    => "requestUri"
          "[parsed][@timestamp]"    => "@timestamp"
        }
        remove_field => ["parsed", "message"]
      }
    }
  }

  # Extract service name from tags or fields for index routing
  if [serviceName] {
    mutate {
      add_field => { "[@metadata][service]" => "%{serviceName}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][service]" => "unknown" }
    }
  }

  # Normalize log levels
  if [log_level] {
    mutate {
      uppercase => ["log_level"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ftgo-logs-%{[@metadata][service]}-%{+YYYY.MM.dd}"
  }
}

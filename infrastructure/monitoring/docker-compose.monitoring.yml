version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ftgo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - ftgo-monitoring

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ftgo-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ftgo-monitoring

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ftgo-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - ftgo-monitoring

volumes:
  prometheus-data:
  grafana-data:

networks:
  ftgo-monitoring:
    # When running alongside the application services compose file, connect them
    # with: docker-compose -f docker-compose.yml -f infrastructure/monitoring/docker-compose.monitoring.yml up
    # Or add 'ftgo-monitoring' as an external network in the service compose file.
    driver: bridge

version: '3.8'

# Production-like local compose for the FTGO microservices.
#
# Pulls prebuilt images from GHCR (pushed by .github/workflows/docker-build.yml).
# Override the tag with the FTGO_IMAGE_TAG env var:
#
#   FTGO_IMAGE_TAG=feat-microservices-migration docker compose up
#
# For a source-build loop (no registry), use docker-compose.dev.yml instead.

x-service-defaults: &service-defaults
  restart: unless-stopped
  depends_on:
    mysql:
      condition: service_healthy
  environment: &service-env
    SPRING_DATASOURCE_URL: jdbc:mysql://mysql/ftgo
    SPRING_DATASOURCE_USERNAME: mysqluser
    SPRING_DATASOURCE_PASSWORD: mysqlpw
    SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.jdbc.Driver
    EVENTUATELOCAL_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    EVENTUATELOCAL_ZOOKEEPER_CONNECTION_STRING: zookeeper:2181
    # Keep the image defaults intact (-XX:MaxRAMPercentage=75.0 +
    # -Djava.security.egd=file:/dev/./urandom) so the heap scales with the
    # container's memory limit. Override JAVA_OPTS per service if you need
    # to tighten limits for a specific compose run.
    JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"
    # Distributed tracing (EM-42). Replaces the deprecated
    # SPRING_SLEUTH_* / SPRING_ZIPKIN_* env vars which were dead config
    # because Sleuth was never on the classpath. Every service now uses
    # Micrometer Tracing with the Brave bridge to report spans to the
    # Zipkin service defined below.
    MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"

services:
  mysql:
    build: ./mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: mysqluser
      MYSQL_PASSWORD: mysqlpw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 20

  ftgo-application:
    build: ./ftgo-application
    image: ${FTGO_APPLICATION_IMAGE:-ftgo-application:local}
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      <<: *service-env
      # Preserve the legacy monolith's explicit 192MB heap cap. Without this,
      # the shared -XX:MaxRAMPercentage=75.0 default would size the heap off
      # the host's total RAM (no mem_limit is set on this service), which is
      # significantly larger than the monolith's historical footprint.
      JAVA_OPTS: "-Xmx192m -Djava.security.egd=file:/dev/./urandom"

  consumer-service:
    <<: *service-defaults
    image: ghcr.io/mbatchelor81/ftgo-consumer-service:${FTGO_IMAGE_TAG:-latest}
    ports:
      - "8082:8080"
    environment:
      <<: *service-env
      SERVICE_NAME: consumer-service

  order-service:
    <<: *service-defaults
    image: ghcr.io/mbatchelor81/ftgo-order-service:${FTGO_IMAGE_TAG:-latest}
    ports:
      - "8083:8080"
    environment:
      <<: *service-env
      SERVICE_NAME: order-service

  restaurant-service:
    <<: *service-defaults
    image: ghcr.io/mbatchelor81/ftgo-restaurant-service:${FTGO_IMAGE_TAG:-latest}
    ports:
      - "8084:8080"
    environment:
      <<: *service-env
      SERVICE_NAME: restaurant-service

  courier-service:
    <<: *service-defaults
    image: ghcr.io/mbatchelor81/ftgo-courier-service:${FTGO_IMAGE_TAG:-latest}
    ports:
      - "8085:8080"
    environment:
      <<: *service-env
      SERVICE_NAME: courier-service

  # ---------------------------------------------------------------------------
  # Distributed tracing collector (EM-42)
  # ---------------------------------------------------------------------------
  # Each service POSTs spans to http://zipkin:9411/api/v2/spans (see
  # MANAGEMENT_ZIPKIN_TRACING_ENDPOINT in service-env). The Zipkin UI is
  # reachable on the host at http://localhost:9411 for local verification.
  # In production the Zipkin collector runs in-cluster — see the K8s
  # manifests under platform/observability/k8s/zipkin.yaml.
  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: ftgo-zipkin
    restart: unless-stopped
    environment:
      STORAGE_TYPE: mem
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

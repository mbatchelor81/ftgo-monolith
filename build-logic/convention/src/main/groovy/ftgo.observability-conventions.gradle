//
// ftgo.observability-conventions
// -------------------------------
// Wires every FTGO microservice to the shared observability stack:
//
//   * Spring Boot Actuator  — `/actuator/health`, `/actuator/prometheus`, …
//   * Micrometer core        — the metrics facade used by service code
//   * Micrometer Prometheus  — the text-format registry scraped by Prometheus
//   * Micrometer Tracing     — `@Observed` + Brave bridge + Zipkin reporter
//                              for distributed tracing (EM-42)
//
// Apply AFTER `ftgo.spring-boot-conventions` so the Spring Boot BOM is
// already in scope. The convention pulls the `observability` and `tracing`
// bundles from `gradle/libs.versions.toml` so version bumps only happen in
// one place.
//
// Services opt in with a single line in their `build.gradle`:
//
//     plugins {
//         id 'ftgo.observability-conventions'
//     }
//
// Adding this plugin makes the `/actuator/prometheus` endpoint available on
// the management port configured in `config/application.yml`. The endpoint
// itself is hardened at the HTTP layer (separate management port + Basic
// auth) — see `services/*/config/application.yml` and
// `platform/observability/README.md`.
//

plugins {
    id 'java'
}

def catalog = extensions.getByType(VersionCatalogsExtension).named('libs')

dependencies {
    implementation catalog.findBundle('observability').get()
    // Distributed tracing stack (EM-42). Pulls spring-boot-starter-aop,
    // micrometer-observation, micrometer-tracing, the Brave bridge, and
    // the Zipkin reporter so every service emitting metrics also emits
    // spans — keeping the observability story consistent across the
    // fleet without each service's build.gradle having to opt in.
    implementation catalog.findBundle('tracing').get()
}

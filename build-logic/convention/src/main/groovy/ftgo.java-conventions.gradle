//
// ftgo.java-conventions
// ----------------------
// Baseline Java settings applied to every FTGO JVM module (services, libs,
// and platform components alike).
//
// What it configures:
//   * Java toolchain pinned to the version declared in libs.versions.toml
//   * UTF-8 source encoding and -parameters compiler flag
//   * Standard repositories (Maven Central) — no jcenter, no Spring milestones
//   * Sources jar artifact
//   * Project group = com.ftgo
//
// Does NOT configure testing (see ftgo.testing-conventions), Spring Boot
// (see ftgo.spring-boot-conventions), or lint hardening. `-Xlint:all
// -Werror` was deliberately left off: several consumers still depend on
// Spring Boot 2.x starters (javax.*) that produce deprecation warnings
// the migration has not yet addressed.
//

plugins {
    id 'java-library'
}

def catalog = extensions.getByType(VersionCatalogsExtension).named('libs')
def javaVersion = JavaLanguageVersion.of(catalog.findVersion('java').get().requiredVersion)

java {
    toolchain {
        languageVersion = javaVersion
    }
    withSourcesJar()
}

repositories {
    mavenCentral()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['-parameters']
}

tasks.withType(Javadoc).configureEach {
    options.encoding = 'UTF-8'
    options.addStringOption('Xdoclint:none', '-quiet')
}

group = 'com.ftgo'

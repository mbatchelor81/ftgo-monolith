//
// ftgo.spring-boot-conventions
// -----------------------------
// Applied by every deployable FTGO microservice. Composes:
//   * ftgo.java-conventions     — Java toolchain + compiler settings
//   * org.springframework.boot  — bootJar / bootRun tasks
//   * io.spring.dependency-management — transitive Spring Boot BOM
//
// This convention intentionally does NOT pull in Web or JPA starters; each
// service declares the starters it actually needs via the shared version
// catalog (see `libs.bundles.spring-boot-web`, etc.).
//
// Pair with `ftgo.testing-conventions` for a full Boot service build.
//

plugins {
    id 'ftgo.java-conventions'
    id 'ftgo.quality-conventions'
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
}

def catalog = extensions.getByType(VersionCatalogsExtension).named('libs')
def springBootVersion = catalog.findVersion('spring-boot').get().requiredVersion

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
    }
}

// Disable the `jar` (plain archive) task in favor of Spring Boot's bootJar —
// microservices should always ship as executable fat jars.
tasks.named('jar') {
    enabled = false
}

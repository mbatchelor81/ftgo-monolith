// =============================================================================
// ftgo.sonarqube-conventions
// =============================================================================
// SonarQube / SonarCloud integration for FTGO microservices.
// Apply to the root project only. Subprojects provide JaCoCo XML reports.
//
// Required environment variables:
//   SONAR_TOKEN        — authentication token
//   SONAR_HOST_URL     — SonarQube server URL (defaults to SonarCloud)
//
// Usage: apply plugin: 'ftgo.sonarqube-conventions'  (root build.gradle only)

plugins {
    id 'org.sonarqube'
}

sonar {
    properties {
        property 'sonar.projectKey', 'ftgo-monolith'
        property 'sonar.projectName', 'FTGO Platform'
        property 'sonar.organization', System.getenv('SONAR_ORGANIZATION') ?: 'mbatchelor81'

        // Source encoding
        property 'sonar.sourceEncoding', 'UTF-8'

        // Coverage — JaCoCo XML report paths (generated by ftgo.quality-conventions)
        property 'sonar.coverage.jacoco.xmlReportPaths',
                 '**/build/reports/jacoco/test/jacocoTestReport.xml'

        // Exclusions — generated code and test fixtures
        property 'sonar.exclusions', [
            '**/generated/**',
            '**/build/**'
        ].join(',')

        property 'sonar.coverage.exclusions', [
            '**/config/**',
            '**/dto/**',
            '**/exception/**',
            '**/*Application.java'
        ].join(',')

        // Quality gate
        property 'sonar.qualitygate.wait', 'true'
    }
}

groups:
  - name: ftgo_service_health
    rules:
      # Service down — no successful scrape for 1 minute
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 1 minute."

      # High error rate — more than 5% of requests returning 5xx
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)
            /
            sum(rate(http_server_requests_seconds_count[5m])) by (job)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has a 5xx error rate above 5% for the last 5 minutes (current: {{ $value | humanizePercentage }})."

      # High latency — p95 response time above 1 second
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, job)) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} p95 latency is above 1s for the last 5 minutes (current: {{ $value | humanizeDuration }})."

  - name: ftgo_jvm_health
    rules:
      # JVM heap usage above 85%
      - alert: HighJvmHeapUsage
        expr: |
          (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap usage on {{ $labels.job }}"
          description: "{{ $labels.job }} heap usage is above 85% for the last 5 minutes (current: {{ $value | humanizePercentage }})."

      # JVM heap usage above 95% — critical
      - alert: CriticalJvmHeapUsage
        expr: |
          (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical JVM heap usage on {{ $labels.job }}"
          description: "{{ $labels.job }} heap usage is above 95% for the last 2 minutes. Immediate attention required."

      # High GC pause time — above 500ms average
      - alert: HighGcPauseTime
        expr: |
          rate(jvm_gc_pause_seconds_sum[5m]) / rate(jvm_gc_pause_seconds_count[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GC pause time on {{ $labels.job }}"
          description: "{{ $labels.job }} average GC pause time is above 500ms."

  - name: ftgo_business_metrics
    rules:
      # No orders created in the last 15 minutes (during business hours)
      - alert: NoOrdersCreated
        expr: |
          increase(ftgo_orders_created_total[15m]) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "No orders created in the last 15 minutes"
          description: "The order service has not recorded any new orders in the last 15 minutes. This may indicate an issue with order processing."

      # High order cancellation rate — more than 20%
      - alert: HighOrderCancellationRate
        expr: |
          (
            rate(ftgo_orders_cancelled_total[30m])
            /
            rate(ftgo_orders_created_total[30m])
          ) > 0.2
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High order cancellation rate"
          description: "More than 20% of orders are being cancelled (current: {{ $value | humanizePercentage }})."

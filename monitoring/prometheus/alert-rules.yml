# =============================================================================
# Prometheus Alerting Rules — FTGO Microservices
# =============================================================================
# Defines alerting rules for service health, RED metrics, JVM, and business
# metric anomalies across all FTGO microservices.
# =============================================================================

groups:
  # ---------------------------------------------------------------------------
  # Service Health Alerts
  # ---------------------------------------------------------------------------
  - name: ftgo_service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 1 minute."

      - alert: HighRestartRate
        expr: process_uptime_seconds < 300 and up == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.job }} may be restarting frequently"
          description: "{{ $labels.job }} uptime is less than 5 minutes, suggesting frequent restarts."

  # ---------------------------------------------------------------------------
  # RED Metrics Alerts (Rate, Errors, Duration)
  # ---------------------------------------------------------------------------
  - name: ftgo_red_metrics
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum by (job) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum by (job) (rate(http_server_requests_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has an HTTP 5xx error rate above 5% for the last 5 minutes. Current value: {{ $value | humanizePercentage }}"

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, sum by (job, le) (rate(http_server_requests_seconds_bucket[5m]))) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} p95 response time is above 1 second. Current value: {{ $value | humanizeDuration }}"

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99, sum by (job, le) (rate(http_server_requests_seconds_bucket[5m]))) > 2.0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical p99 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} p99 response time is above 2 seconds. Current value: {{ $value | humanizeDuration }}"

      - alert: LowRequestRate
        expr: |
          sum by (job) (rate(http_server_requests_seconds_count[5m])) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No requests on {{ $labels.job }}"
          description: "{{ $labels.job }} has received zero requests for the last 10 minutes."

  # ---------------------------------------------------------------------------
  # JVM Alerts
  # ---------------------------------------------------------------------------
  - name: ftgo_jvm_alerts
    rules:
      - alert: HighJvmMemoryUsage
        expr: |
          (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap usage on {{ $labels.job }}"
          description: "{{ $labels.job }} JVM heap usage is above 85%. Current value: {{ $value | humanizePercentage }}"

      - alert: CriticalJvmMemoryUsage
        expr: |
          (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical JVM heap usage on {{ $labels.job }}"
          description: "{{ $labels.job }} JVM heap usage is above 95%. OOM may be imminent. Current value: {{ $value | humanizePercentage }}"

      - alert: HighGcPauseTime
        expr: |
          rate(jvm_gc_pause_seconds_sum[5m]) / rate(jvm_gc_pause_seconds_count[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GC pause time on {{ $labels.job }}"
          description: "{{ $labels.job }} average GC pause time is above 500ms."

      - alert: HighThreadCount
        expr: jvm_threads_live_threads > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High thread count on {{ $labels.job }}"
          description: "{{ $labels.job }} has {{ $value }} live threads, which is above the threshold of 300."

  # ---------------------------------------------------------------------------
  # Business Metric Alerts
  # ---------------------------------------------------------------------------
  - name: ftgo_business_alerts
    rules:
      - alert: HighOrderCancellationRate
        expr: |
          (
            rate(ftgo_orders_cancelled_total[15m])
            /
            (rate(ftgo_orders_created_total[15m]) > 0)
          ) > 0.20
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High order cancellation rate"
          description: "More than 20% of orders are being cancelled in the last 15 minutes. Current rate: {{ $value | humanizePercentage }}"

      - alert: NoCouriersAvailable
        expr: ftgo_couriers_available == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No couriers available"
          description: "There are no available couriers for delivery assignment for the last 5 minutes."

      - alert: ConsumerValidationFailureSpike
        expr: |
          rate(ftgo_consumers_validation_failed_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Consumer validation failures spiking"
          description: "Consumer validation failure rate is above 0.5/sec for the last 5 minutes."

buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath "org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}"
        classpath "io.spring.gradle:dependency-management-plugin:$springDependencyManagementPluginVersion"
    }

    apply plugin: WaitForMySqlPlugin
}

plugins {
    id "com.github.ben-manes.versions" version "0.51.0"
}


// =============================================================================
// Legacy monolith modules — Java 1.8 / Spring Boot 2.x configuration
// (unchanged during migration; will be removed once services are extracted)
// =============================================================================

// Define which projects are legacy (root-level) vs new (services/ and shared/)
def legacyModules = subprojects.findAll { sp ->
    !sp.path.startsWith(':services:') && !sp.path.startsWith(':shared:')
}
def newModules = subprojects.findAll { sp ->
    sp.path.startsWith(':services:') || sp.path.startsWith(':shared:')
}

// Legacy modules keep the original Java 1.8 + Spring Boot 2.x settings
configure(legacyModules) {
    apply plugin: 'java-library'
    sourceCompatibility = '1.8'
    targetCompatibility = '1.8'

    group = 'net.chrisrichardson.ftgo'

    repositories {
        mavenCentral()

        maven {
            url "${project.rootDir}/build/repo"
        }
    }
}

// New microservice modules get their group set; convention plugins
// are applied per-module via their own build.gradle files.
configure(newModules) {
    group = 'com.ftgo'

    repositories {
        mavenCentral()
    }
}

name: "Tests: Integration"

on:
  push:
    branches: [main, master, feat/microservices-migration]
    paths:
      - "services/**/src/**"
      - "services/**/build.gradle"
      - "build-logic/**"
      - "gradle/libs.versions.toml"
      - "services/settings.gradle"
      - ".github/workflows/test-integration.yml"
  pull_request:
    branches: [main, master, feat/microservices-migration]
    paths:
      - "services/**/src/**"
      - "services/**/build.gradle"
      - "build-logic/**"
      - "gradle/libs.versions.toml"
      - "services/settings.gradle"
      - ".github/workflows/test-integration.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  integration-tests:
    name: "Integration Tests (${{ matrix.service }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        service:
          - ftgo-consumer-service
          - ftgo-order-service
          - ftgo-restaurant-service
          - ftgo-courier-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ftgo
          POSTGRES_PASSWORD: ftgo
          POSTGRES_DB: ftgo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ftgo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            services/.gradle
          key: ${{ runner.os }}-gradle-integ-${{ matrix.service }}-${{ hashFiles('services/**/*.gradle', 'build-logic/**/*.gradle', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-integ-${{ matrix.service }}-
            ${{ runner.os }}-gradle-integ-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x services/gradlew

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U ftgo && break
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        working-directory: services
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ftgo_test
          SPRING_DATASOURCE_USERNAME: ftgo
          SPRING_DATASOURCE_PASSWORD: ftgo
          SPRING_PROFILES_ACTIVE: test
        run: |
          start_time=$(date +%s)
          ./gradlew :${{ matrix.service }}:integrationTest --no-daemon
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "## Integration Test Execution Time" >> $GITHUB_STEP_SUMMARY
          echo "**${{ matrix.service }}**: ${elapsed}s" >> $GITHUB_STEP_SUMMARY

      - name: Generate integration test coverage report
        if: always()
        working-directory: services
        run: ./gradlew :${{ matrix.service }}:jacocoIntegrationTestReport --no-daemon || true

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: services/${{ matrix.service }}/build/test-results/integrationTest/**/*.xml
          check_name: "Integration Tests — ${{ matrix.service }}"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/build/reports/tests/integrationTest/
            services/${{ matrix.service }}/build/reports/jacoco/
          retention-days: 14

  integration-tests-summary:
    name: "Integration Tests Summary"
    runs-on: ubuntu-latest
    needs: integration-tests
    if: always()

    steps:
      - name: Check integration test results
        run: |
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "::error::One or more integration test jobs failed"
            exit 1
          fi
          echo "All integration tests passed successfully" >> $GITHUB_STEP_SUMMARY

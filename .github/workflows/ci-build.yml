# =============================================================================
# CI Workflow: Gradle Build & Test Pipeline
# =============================================================================
# Triggers on pushes and PRs to the main and migration branches.
# Uses a matrix strategy to build/test each microservice independently,
# with path-based filtering so only services with changed files are built.
# Shared library changes trigger builds for all dependent services.
#
# Test tiers:
#   1. Unit tests     — fast, no external deps, per-service matrix
#   2. Integration    — MySQL service container, per-service matrix
#   3. E2E            — full Docker Compose stack
#
# Coverage: JaCoCo reports generated and uploaded as artifacts.
# =============================================================================

name: CI Build & Test

on:
  push:
    branches:
      - main
      - master
      - 'feat/microservices-migration*'
    paths:
      # Microservices
      - 'ftgo-order-service/**'
      - 'ftgo-order-service-api/**'
      - 'ftgo-consumer-service/**'
      - 'ftgo-consumer-service-api/**'
      - 'ftgo-restaurant-service/**'
      - 'ftgo-restaurant-service-api/**'
      - 'ftgo-courier-service/**'
      - 'ftgo-courier-service-api/**'
      - 'ftgo-application/**'
      # Shared libraries
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-domain/**'
      - 'ftgo-test-util/**'
      - 'ftgo-flyway/**'
      - 'common-swagger/**'
      # Build infrastructure
      - 'buildSrc/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      # CI workflow itself
      - '.github/workflows/ci-build.yml'
  pull_request:
    branches:
      - main
      - master
      - 'feat/microservices-migration*'
    paths:
      # Microservices
      - 'ftgo-order-service/**'
      - 'ftgo-order-service-api/**'
      - 'ftgo-consumer-service/**'
      - 'ftgo-consumer-service-api/**'
      - 'ftgo-restaurant-service/**'
      - 'ftgo-restaurant-service-api/**'
      - 'ftgo-courier-service/**'
      - 'ftgo-courier-service-api/**'
      - 'ftgo-application/**'
      # Shared libraries
      - 'ftgo-common/**'
      - 'ftgo-common-jpa/**'
      - 'ftgo-domain/**'
      - 'ftgo-test-util/**'
      - 'ftgo-flyway/**'
      - 'common-swagger/**'
      # Build infrastructure
      - 'buildSrc/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      # CI workflow itself
      - '.github/workflows/ci-build.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

# ---------------------------------------------------------------------------
# Cancel in-progress runs for the same branch/PR to save resources
# ---------------------------------------------------------------------------
concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Detect which modules have changed to drive the build matrix
  # ===========================================================================
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      shared_changed: ${{ steps.changes.outputs.shared_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed modules
        id: changes
        run: |
          # Determine the diff base
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
          else
            BASE_SHA=${{ github.event.before }}
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null || echo "")

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # -------------------------------------------------------------------
          # Check if shared libraries or build infrastructure changed
          # -------------------------------------------------------------------
          SHARED_CHANGED=false
          if echo "$CHANGED_FILES" | grep -qE "^(ftgo-common/|ftgo-common-jpa/|ftgo-domain/|ftgo-test-util/|ftgo-flyway/|common-swagger/|buildSrc/|build\.gradle|settings\.gradle|gradle\.properties|gradle/|\.github/workflows/)"; then
            SHARED_CHANGED=true
          fi
          echo "shared_changed=$SHARED_CHANGED" >> "$GITHUB_OUTPUT"

          # -------------------------------------------------------------------
          # All buildable service modules
          # -------------------------------------------------------------------
          ALL_SERVICES='["ftgo-order-service","ftgo-consumer-service","ftgo-restaurant-service","ftgo-courier-service","ftgo-application"]'

          # If shared code changed, rebuild all services
          if [ "$SHARED_CHANGED" = "true" ]; then
            echo "Shared libraries or build config changed — building all services"
            echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # -------------------------------------------------------------------
          # Otherwise detect individual service changes
          # -------------------------------------------------------------------
          RESULT="["
          FIRST=true
          for SVC in ftgo-order-service ftgo-consumer-service ftgo-restaurant-service ftgo-courier-service ftgo-application; do
            # Check both the service dir and its API module (e.g. ftgo-order-service-api)
            if echo "$CHANGED_FILES" | grep -qE "^${SVC}(-api)?/"; then
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                RESULT+=","
              fi
              RESULT+="\"$SVC\""
            fi
          done
          RESULT+="]"

          # Fallback: if nothing matched (e.g. initial commit), build all
          if [ "$RESULT" = "[]" ]; then
            echo "No specific service changes detected — building all services"
            RESULT=$ALL_SERVICES
          fi

          echo "services=$RESULT" >> "$GITHUB_OUTPUT"
          echo "Services to build: $RESULT"

  # ===========================================================================
  # Build shared libraries (when their code changes)
  # ===========================================================================
  build-shared-libs:
    name: Build Shared Libraries
    needs: detect-changes
    if: needs.detect-changes.outputs.shared_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-shared-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-shared-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build shared libraries
        run: |
          ./gradlew :ftgo-common:build \
                    :ftgo-common-jpa:build \
                    :ftgo-domain:build \
                    :ftgo-test-util:build \
                    :common-swagger:build \
                    --no-daemon --parallel

      - name: Run shared library tests
        run: |
          ./gradlew :ftgo-common:test \
                    :ftgo-common-jpa:test \
                    :ftgo-domain:test \
                    :ftgo-test-util:test \
                    :common-swagger:test \
                    --no-daemon --parallel

      - name: Upload shared library test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-libs-test-results
          path: |
            ftgo-common/build/reports/tests/
            ftgo-common-jpa/build/reports/tests/
            ftgo-domain/build/reports/tests/
            ftgo-test-util/build/reports/tests/
            common-swagger/build/reports/tests/
          retention-days: 14

  # ===========================================================================
  # TIER 1: Unit tests — fast, no external dependencies, per-service matrix
  # ===========================================================================
  unit-tests:
    name: "Unit Tests: ${{ matrix.service }}"
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.service }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.service }}-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Compile ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:classes :${{ matrix.service }}:testClasses --no-daemon

      - name: Run unit tests
        run: ./gradlew :${{ matrix.service }}:test --no-daemon

      - name: Generate JaCoCo coverage report
        if: always()
        continue-on-error: true
        run: ./gradlew :${{ matrix.service }}:jacocoTestReport --no-daemon

      - name: Upload unit test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/build/reports/tests/test/
            ${{ matrix.service }}/build/test-results/test/
          retention-days: 14

      - name: Upload unit test coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/build/reports/jacoco/test/
            ${{ matrix.service }}/build/jacoco/test.exec
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ${{ matrix.service }}/build/test-results/test/**/*.xml
          check_name: "Unit Tests: ${{ matrix.service }}"
          comment_mode: off

  # ===========================================================================
  # TIER 2: Integration tests — MySQL service container, per-service matrix
  # ===========================================================================
  integration-tests:
    name: "Integration Tests: ${{ matrix.service }}"
    needs: [detect-changes, unit-tests]
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ vars.CI_MYSQL_ROOT_PASS || 'rootpassword' }}
          MYSQL_DATABASE: ${{ vars.CI_MYSQL_DB || 'ftgo' }}
          MYSQL_USER: ${{ vars.CI_MYSQL_USER || 'ciuser' }}
          MYSQL_PASSWORD: ${{ vars.CI_MYSQL_PASS || 'cipass' }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.service }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.service }}-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run Flyway database migrations
        run: ./gradlew :ftgo-flyway:flywayMigrate --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/${{ vars.CI_MYSQL_DB || 'ftgo' }}
          SPRING_DATASOURCE_USERNAME: ${{ vars.CI_MYSQL_USER || 'ciuser' }}
          SPRING_DATASOURCE_PASSWORD: ${{ vars.CI_MYSQL_PASS || 'cipass' }}
          FLYWAY_URL: jdbc:mysql://127.0.0.1:3306/${{ vars.CI_MYSQL_DB || 'ftgo' }}
          FLYWAY_USER: root
          FLYWAY_PASSWORD: ${{ vars.CI_MYSQL_ROOT_PASS || 'rootpassword' }}

      - name: Run integration tests
        continue-on-error: true
        run: ./gradlew :${{ matrix.service }}:integrationTest --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/${{ vars.CI_MYSQL_DB || 'ftgo' }}
          SPRING_DATASOURCE_USERNAME: ${{ vars.CI_MYSQL_USER || 'ciuser' }}
          SPRING_DATASOURCE_PASSWORD: ${{ vars.CI_MYSQL_PASS || 'cipass' }}
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver

      - name: Generate integration test coverage report
        if: always()
        run: ./gradlew :${{ matrix.service }}:jacocoIntegrationTestReport --no-daemon || true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/build/reports/tests/integrationTest/
            ${{ matrix.service }}/build/test-results/integrationTest/
          retention-days: 14

      - name: Upload integration test coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/build/reports/jacoco/jacocoIntegrationTestReport/
            ${{ matrix.service }}/build/jacoco/integrationTest.exec
          retention-days: 14

      - name: Publish integration test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ${{ matrix.service }}/build/test-results/integrationTest/**/*.xml
          check_name: "Integration Tests: ${{ matrix.service }}"
          comment_mode: off

  # ===========================================================================
  # TIER 3: End-to-end tests — full Docker Compose service stack
  # ===========================================================================
  e2e-tests:
    name: "E2E Tests"
    needs: [detect-changes, unit-tests]
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-e2e-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-e2e-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build application for E2E
        run: ./gradlew :ftgo-application:assemble --no-daemon

      - name: Start Docker Compose stack
        run: |
          docker compose up -d --build mysql
          # Wait for MySQL to be healthy
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if docker compose exec -T mysql mysqladmin ping -h 127.0.0.1 --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Run Flyway migrations
        run: ./gradlew :ftgo-flyway:flywayMigrate --no-daemon
        env:
          DOCKER_HOST_IP: 127.0.0.1

      - name: Start application services
        run: |
          docker compose up -d
          echo "Waiting for services to start..."
          sleep 15
          # Verify services are up
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8081/actuator/health 2>/dev/null; then
              echo "Application is healthy"
              break
            fi
            echo "Waiting for app... ($i/20)"
            sleep 3
          done

      - name: Run E2E tests
        run: ./gradlew :ftgo-end-to-end-tests:cleanTest :ftgo-end-to-end-tests:test --no-daemon
        env:
          DOCKER_HOST_IP: 127.0.0.1

      - name: Collect Docker logs
        if: always()
        run: |
          mkdir -p build/e2e-logs
          docker compose logs > build/e2e-logs/docker-compose.log 2>&1 || true

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            ftgo-end-to-end-tests/build/reports/tests/
            ftgo-end-to-end-tests/build/test-results/
            build/e2e-logs/
          retention-days: 14

      - name: Publish E2E test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ftgo-end-to-end-tests/build/test-results/**/*.xml
          check_name: "E2E Tests"
          comment_mode: off

      - name: Tear down Docker Compose
        if: always()
        run: docker compose down --remove-orphans -v

  # ===========================================================================
  # Build and test each changed microservice (compile + assemble JAR)
  # ===========================================================================
  build-service:
    name: Build & Test ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      # -----------------------------------------------------------------------
      # Setup
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.service }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.service }}-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      # -----------------------------------------------------------------------
      # Compile
      # -----------------------------------------------------------------------
      - name: Compile ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:classes :${{ matrix.service }}:testClasses --no-daemon

      # -----------------------------------------------------------------------
      # Unit tests
      # -----------------------------------------------------------------------
      - name: Run unit tests for ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:test --no-daemon

      # -----------------------------------------------------------------------
      # Build (assemble JAR / check)
      # -----------------------------------------------------------------------
      - name: Build ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:build --no-daemon

      # -----------------------------------------------------------------------
      # Upload test results
      # -----------------------------------------------------------------------
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/
          retention-days: 14

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: ${{ matrix.service }}/build/libs/
          retention-days: 7

  # ===========================================================================
  # Test coverage aggregation — combines coverage from all tiers
  # ===========================================================================
  coverage-report:
    name: Coverage Report
    needs: [detect-changes, unit-tests, integration-tests]
    if: always() && needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-coverage-*"
          path: coverage-artifacts/

      - name: Generate coverage summary
        run: |
          echo "## Code Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Unit Coverage | Integration Coverage |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------------|---------------------|" >> "$GITHUB_STEP_SUMMARY"

          for dir in coverage-artifacts/unit-coverage-*; do
            if [ -d "$dir" ]; then
              SERVICE=$(basename "$dir" | sed 's/unit-coverage-//')
              echo "| $SERVICE | See artifact | See artifact |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Coverage reports are available as downloadable artifacts." >> "$GITHUB_STEP_SUMMARY"
          echo "Target: 70%+ line coverage per service." >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Test execution time tracking
  # ===========================================================================
  test-timing:
    name: Test Timing Summary
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all test result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-test-results-*"
          path: test-results/

      - name: Generate timing summary
        run: |
          echo "## Test Execution Times" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tier | Service | Time |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|------|" >> "$GITHUB_STEP_SUMMARY"

          # Parse JUnit XML for timing info
          for dir in test-results/unit-test-results-*; do
            if [ -d "$dir" ]; then
              SERVICE=$(basename "$dir" | sed 's/unit-test-results-//')
              TIME=$(find "$dir" -name "*.xml" -exec grep -h 'testsuite' {} \; 2>/dev/null | head -1 | grep -oP 'time="[^"]*"' | head -1 | tr -d 'time="' || echo "N/A")
              echo "| Unit | $SERVICE | ${TIME}s |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          for dir in test-results/integration-test-results-*; do
            if [ -d "$dir" ]; then
              SERVICE=$(basename "$dir" | sed 's/integration-test-results-//')
              TIME=$(find "$dir" -name "*.xml" -exec grep -h 'testsuite' {} \; 2>/dev/null | head -1 | grep -oP 'time="[^"]*"' | head -1 | tr -d 'time="' || echo "N/A")
              echo "| Integration | $SERVICE | ${TIME}s |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Unit test target: < 2 minutes per service." >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Summary gate — single status check for branch protection
  # ===========================================================================
  ci-status:
    name: CI Status
    needs: [detect-changes, build-service, build-shared-libs, unit-tests, integration-tests, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build results
        run: |
          echo "=== CI Build Summary ==="
          echo "Shared libs changed: ${{ needs.detect-changes.outputs.shared_changed }}"
          echo "Services built: ${{ needs.detect-changes.outputs.services }}"
          echo ""
          echo "=== Test Results ==="
          echo "Unit tests: ${{ needs.unit-tests.result }}"
          echo "Integration tests: ${{ needs.integration-tests.result }}"
          echo "E2E tests: ${{ needs.e2e-tests.result }}"

          FAILED=false

          # Fail if any required job failed (skip check for jobs that were skipped)
          if [ "${{ needs.build-service.result }}" = "failure" ]; then
            echo "FAILED: Service builds failed"
            FAILED=true
          fi

          if [ "${{ needs.build-shared-libs.result }}" = "failure" ]; then
            echo "FAILED: Shared library builds failed"
            FAILED=true
          fi

          if [ "${{ needs.unit-tests.result }}" = "failure" ]; then
            echo "FAILED: Unit tests failed"
            FAILED=true
          fi

          if [ "${{ needs.integration-tests.result }}" = "failure" ]; then
            echo "FAILED: Integration tests failed"
            FAILED=true
          fi

          if [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
            echo "FAILED: E2E tests failed"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "One or more CI checks failed. See above for details."
            exit 1
          fi

          echo ""
          echo "All CI checks passed"

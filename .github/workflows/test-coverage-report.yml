name: "Tests: Coverage Report"

on:
  push:
    branches: [main, master, feat/microservices-migration]
    paths:
      - "services/**/src/**"
      - "services/**/build.gradle"
      - "build-logic/**"
      - "gradle/libs.versions.toml"
      - ".github/workflows/test-coverage-report.yml"
  pull_request:
    branches: [main, master, feat/microservices-migration]
    paths:
      - "services/**/src/**"
      - "services/**/build.gradle"
      - "build-logic/**"
      - "gradle/libs.versions.toml"
      - ".github/workflows/test-coverage-report.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  coverage-report:
    name: "Aggregated Coverage Report"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            services/.gradle
          key: ${{ runner.os }}-gradle-coverage-${{ hashFiles('services/**/*.gradle', 'build-logic/**/*.gradle', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-coverage-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x services/gradlew

      - name: Run all unit tests with coverage
        working-directory: services
        run: ./gradlew test jacocoTestReport --no-daemon --continue

      - name: Aggregate coverage data
        working-directory: services
        run: |
          echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Report |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY

          for service in ftgo-consumer-service ftgo-order-service ftgo-restaurant-service ftgo-courier-service; do
            report_dir="${service}/build/reports/jacoco/test"
            if [ -d "$report_dir" ]; then
              echo "| ${service} | Generated |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| ${service} | No coverage data |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload all coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-all
          path: |
            services/*/build/reports/jacoco/
            services/*/build/test-results/
          retention-days: 30

      - name: Add coverage to PR comment
        if: github.event_name == 'pull_request' && always()
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: |
            services/ftgo-consumer-service/build/reports/jacoco/test/jacocoTestReport.xml,
            services/ftgo-order-service/build/reports/jacoco/test/jacocoTestReport.xml,
            services/ftgo-restaurant-service/build/reports/jacoco/test/jacocoTestReport.xml,
            services/ftgo-courier-service/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Aggregated Code Coverage Report"
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          update-comment: true

  coverage-trend:
    name: "Coverage Trend Tracking"
    runs-on: ubuntu-latest
    needs: coverage-report
    if: github.event_name == 'push' && github.ref == 'refs/heads/feat/microservices-migration'

    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports-all
          path: coverage-data

      - name: Record coverage metrics
        run: |
          echo "## Coverage Trend" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage data recorded for commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports are available as build artifacts for historical tracking." >> $GITHUB_STEP_SUMMARY

name: FTGO Application CI

on:
  push:
    branches: [ main, feat/microservices-migration ]
    paths:
      - 'ftgo-application/**'
      - 'ftgo-domain/**'
      - 'ftgo-common/**'
      - 'services/**'
      - 'shared/**'
      - 'build-logic/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
  pull_request:
    branches: [ main, feat/microservices-migration ]
    paths:
      - 'ftgo-application/**'
      - 'ftgo-domain/**'
      - 'ftgo-common/**'
      - 'services/**'
      - 'shared/**'
      - 'build-logic/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/feat/microservices-migration' }}

      - name: Build all modules
        run: ./gradlew build -x :ftgo-end-to-end-tests:build -x :ftgo-end-to-end-tests-common:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-application
          path: |
            ftgo-application/build/reports/tests/
            ftgo-domain/build/reports/tests/
          retention-days: 14

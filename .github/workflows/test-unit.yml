name: "Tests: Unit"

on:
  push:
    branches: [main, master, feat/microservices-migration]
    paths:
      - "services/**/src/main/**"
      - "services/**/src/test/**"
      - "services/**/build.gradle"
      - "build-logic/**"
      - "gradle/libs.versions.toml"
      - "services/settings.gradle"
      - ".github/workflows/test-unit.yml"
  pull_request:
    branches: [main, master, feat/microservices-migration]
    paths:
      - "services/**/src/main/**"
      - "services/**/src/test/**"
      - "services/**/build.gradle"
      - "build-logic/**"
      - "gradle/libs.versions.toml"
      - "services/settings.gradle"
      - ".github/workflows/test-unit.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    name: "Unit Tests (${{ matrix.service }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        service:
          - ftgo-consumer-service
          - ftgo-order-service
          - ftgo-restaurant-service
          - ftgo-courier-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            services/.gradle
          key: ${{ runner.os }}-gradle-unit-${{ matrix.service }}-${{ hashFiles('services/**/*.gradle', 'build-logic/**/*.gradle', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-unit-${{ matrix.service }}-
            ${{ runner.os }}-gradle-unit-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x services/gradlew

      - name: Run unit tests
        working-directory: services
        run: |
          start_time=$(date +%s)
          ./gradlew :${{ matrix.service }}:test --no-daemon
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "## Unit Test Execution Time" >> $GITHUB_STEP_SUMMARY
          echo "**${{ matrix.service }}**: ${elapsed}s" >> $GITHUB_STEP_SUMMARY
          if [ $elapsed -gt 120 ]; then
            echo "::warning::Unit tests took longer than 2 minutes (${elapsed}s)"
          fi

      - name: Generate JaCoCo coverage report
        if: always()
        working-directory: services
        run: ./gradlew :${{ matrix.service }}:jacocoTestReport --no-daemon

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: services/${{ matrix.service }}/build/test-results/test/**/*.xml
          check_name: "Unit Tests — ${{ matrix.service }}"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/build/reports/tests/test/
            services/${{ matrix.service }}/build/reports/jacoco/test/
          retention-days: 14

      - name: Upload JaCoCo coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-${{ matrix.service }}
          path: services/${{ matrix.service }}/build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 14

      - name: Add coverage summary to PR
        if: github.event_name == 'pull_request' && always()
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: services/${{ matrix.service }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Coverage — ${{ matrix.service }} (Unit)"
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          update-comment: true

  unit-tests-summary:
    name: "Unit Tests Summary"
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()

    steps:
      - name: Check unit test results
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "::error::One or more unit test jobs failed"
            exit 1
          fi
          echo "All unit tests passed successfully" >> $GITHUB_STEP_SUMMARY

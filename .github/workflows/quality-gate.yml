name: FTGO Quality Gate

on:
  pull_request:
    branches: [ main, feat/microservices-migration ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # =========================================================================
  # Static Analysis Quality Gate
  # =========================================================================
  static-analysis:
    name: "Static Analysis (${{ matrix.module }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - shared-ftgo-common
          - shared-ftgo-common-jpa
          - shared-ftgo-domain
          - shared-ftgo-security-lib
          - shared-ftgo-metrics-lib
          - shared-ftgo-openapi-lib
          - shared-ftgo-tracing-lib
          - shared-ftgo-error-handling-lib
          - shared-ftgo-logging-lib
          - shared-ftgo-resilience-lib
          - services-ftgo-consumer-service
          - services-ftgo-order-service
          - services-ftgo-restaurant-service
          - services-ftgo-courier-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          cache-read-only: true

      - name: Run Checkstyle
        run: ./gradlew :${{ matrix.module }}:checkstyleMain || true

      - name: Run PMD
        run: ./gradlew :${{ matrix.module }}:pmdMain || true

      - name: Upload analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ matrix.module }}
          path: |
            **/build/reports/checkstyle/
            **/build/reports/pmd/
          retention-days: 14

  # =========================================================================
  # Code Coverage Gate
  # =========================================================================
  coverage-gate:
    name: "Coverage Gate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          cache-read-only: true

      - name: Run tests with coverage
        run: |
          ./gradlew test jacocoTestReport \
            -x :ftgo-end-to-end-tests:test \
            -x :ftgo-end-to-end-tests-common:test \
            -x :ftgo-end-to-end-tests-common:compileJava \
            -x :ftgo-application:compileTestJava \
            -x :ftgo-application:test \
            -x :ftgo-order-service:test \
            --parallel || true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/
          retention-days: 14

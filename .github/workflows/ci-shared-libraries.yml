name: "CI — Shared Libraries"

on:
  push:
    branches: [main, feat/microservices-migration]
    paths:
      - "ftgo-common/**"
      - "ftgo-common-jpa/**"
      - "ftgo-domain/**"
      - "common-swagger/**"
      - "ftgo-test-util/**"
      - "libs/ftgo-common-lib/**"
      - "build-logic/**"
      - "buildSrc/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
  pull_request:
    branches: [main, feat/microservices-migration]
    paths:
      - "ftgo-common/**"
      - "ftgo-common-jpa/**"
      - "ftgo-domain/**"
      - "common-swagger/**"
      - "ftgo-test-util/**"
      - "libs/ftgo-common-lib/**"
      - "build-logic/**"
      - "buildSrc/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-shared-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-shared-
            ${{ runner.os }}-gradle-

      - name: Build shared libraries
        run: |
          ./gradlew \
            :ftgo-common:build \
            :ftgo-common-jpa:build \
            :ftgo-domain:build \
            :common-swagger:build \
            :ftgo-test-util:build \
            :ftgo-common-lib:build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shared-libraries-test-reports
          path: |
            ftgo-common/build/reports/tests/
            ftgo-common-jpa/build/reports/tests/
            ftgo-domain/build/reports/tests/
            common-swagger/build/reports/tests/
            ftgo-test-util/build/reports/tests/
            libs/ftgo-common-lib/build/reports/tests/
          retention-days: 7

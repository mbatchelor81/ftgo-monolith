name: Restaurant Service CI

on:
  push:
    branches: [ main, feat/microservices-migration ]
    paths:
      - 'services/ftgo-restaurant-service/**'
      - 'services/ftgo-restaurant-service-api/**'
      - 'shared/**'
      - 'build-logic/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
  pull_request:
    branches: [ main, feat/microservices-migration ]
    paths:
      - 'services/ftgo-restaurant-service/**'
      - 'services/ftgo-restaurant-service-api/**'
      - 'shared/**'
      - 'build-logic/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/feat/microservices-migration' }}

      - name: Build Restaurant Service API
        run: ./gradlew :services-ftgo-restaurant-service-api:build

      - name: Build Restaurant Service
        run: ./gradlew :services-ftgo-restaurant-service:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-restaurant-service
          path: |
            services/ftgo-restaurant-service/build/reports/tests/
            services/ftgo-restaurant-service-api/build/reports/tests/
          retention-days: 14

name: "CI: Order Service"

on:
  push:
    branches: [main, master, feat/microservices-migration]
    paths:
      - "services/ftgo-order-service/**"
      - "services/ftgo-common/**"
      - "services/ftgo-common-jpa/**"
      - "build-logic/**"
      - "gradle/libs.versions.toml"
      - "services/settings.gradle"
      - ".github/workflows/ci-order-service.yml"
  pull_request:
    branches: [main, master, feat/microservices-migration]
    paths:
      - "services/ftgo-order-service/**"
      - "services/ftgo-common/**"
      - "services/ftgo-common-jpa/**"
      - "build-logic/**"
      - "gradle/libs.versions.toml"
      - "services/settings.gradle"
      - ".github/workflows/ci-order-service.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            services/.gradle
          key: ${{ runner.os }}-gradle-order-${{ hashFiles('services/**/*.gradle', 'build-logic/**/*.gradle', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-order-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x services/gradlew

      - name: Build order service
        working-directory: services
        run: ./gradlew :ftgo-order-service:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-test-reports
          path: services/ftgo-order-service/build/reports/tests/
          retention-days: 14

name: "CI — Order Service"

on:
  push:
    branches: [main, feat/microservices-migration]
    paths:
      - "services/order-service/**"
      - "services/consumer-service/consumer-service-api/**"
      - "services/restaurant-service/restaurant-service-api/**"
      - "ftgo-common/**"
      - "ftgo-common-jpa/**"
      - "ftgo-domain/**"
      - "common-swagger/**"
      - "ftgo-test-util/**"
      - "libs/ftgo-common-lib/**"
      - "build-logic/**"
      - "buildSrc/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
  pull_request:
    branches: [main, feat/microservices-migration]
    paths:
      - "services/order-service/**"
      - "services/consumer-service/consumer-service-api/**"
      - "services/restaurant-service/restaurant-service-api/**"
      - "ftgo-common/**"
      - "ftgo-common-jpa/**"
      - "ftgo-domain/**"
      - "common-swagger/**"
      - "ftgo-test-util/**"
      - "libs/ftgo-common-lib/**"
      - "build-logic/**"
      - "buildSrc/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-order-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-order-
            ${{ runner.os }}-gradle-

      - name: Build Order Service
        run: |
          ./gradlew :order-service-api:build :order-service-app:build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-test-reports
          path: |
            services/order-service/**/build/reports/tests/
          retention-days: 7

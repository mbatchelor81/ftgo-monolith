name: Docker Build & Publish

on:
  push:
    branches:
      - main
      - master
      - feat/microservices-migration
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master
      - feat/microservices-migration
    paths:
      - 'services/**'
      - 'libs/**'
      - 'ftgo-**/**'
      - 'templates/service-template/**'
      - 'buildSrc/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

# Cancel in-flight runs when a new commit lands on the same ref.
concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/ftgo

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    name: Build & scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - consumer-service
          - order-service
          - restaurant-service
          - courier-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The services/*/build.gradle modules are scaffolds during the
      # strangler-fig migration (EM-30). Until a module wires in the Spring
      # Boot plugin, the :services:<name>:bootJar task does not exist and the
      # image has no payload to package. We skip every downstream step for
      # that matrix entry instead of failing the matrix so the workflow
      # remains green as each service gets wired up incrementally.
      - name: Detect Spring Boot app (bootJar availability)
        id: detect
        run: |
          set -euo pipefail
          MODULE_PATH="services/${{ matrix.service }}"
          GRADLE_FILE="${MODULE_PATH}/build.gradle"
          HAS_BOOTJAR="false"
          if [[ -f "${GRADLE_FILE}" ]] \
             && grep -qE "(apply plugin:\s*['\"]org\.springframework\.boot['\"]|id\s+['\"]org\.springframework\.boot['\"])" "${GRADLE_FILE}"; then
            HAS_BOOTJAR="true"
          fi
          # Also detect a @SpringBootApplication entrypoint as a secondary
          # signal in case the plugin is applied via conventions/buildSrc.
          if [[ "${HAS_BOOTJAR}" != "true" ]] \
             && grep -rlqE "@SpringBootApplication" "${MODULE_PATH}/src/main" 2>/dev/null; then
            HAS_BOOTJAR="true"
          fi
          echo "has_bootjar=${HAS_BOOTJAR}" >> "${GITHUB_OUTPUT}"
          if [[ "${HAS_BOOTJAR}" == "true" ]]; then
            echo "Spring Boot app detected for ${{ matrix.service }}; will build image."
          else
            echo "${{ matrix.service }} is still a scaffold (no Spring Boot plugin / @SpringBootApplication). Skipping image build."
          fi

      - name: Skip summary (scaffold)
        if: steps.detect.outputs.has_bootjar != 'true'
        run: |
          {
            echo "### ${{ matrix.service }} — Docker build skipped"
            echo ""
            echo "\`services/${{ matrix.service }}\` is a scaffold during the strangler-fig migration. The Docker image build is gated on either the \`org.springframework.boot\` plugin being applied in \`build.gradle\` or a \`@SpringBootApplication\` entrypoint under \`src/main\`. Wire in Spring Boot to enable this matrix entry."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set up JDK 8
        if: steps.detect.outputs.has_bootjar == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Cache Gradle caches
        if: steps.detect.outputs.has_bootjar == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ matrix.service }}-${{ hashFiles('**/*.gradle', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ matrix.service }}-
            gradle-${{ runner.os }}-

      - name: Build bootJar
        if: steps.detect.outputs.has_bootjar == 'true'
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon ":services:${{ matrix.service }}:bootJar" -x test
          # Normalize the output filename so the Dockerfile's JAR_PATH default
          # (app.jar) works without having to know the exact Gradle jar name.
          JAR="$(ls -1 services/${{ matrix.service }}/build/libs/*.jar | grep -v -E '\-plain\.jar$' | head -n1)"
          cp "${JAR}" "services/${{ matrix.service }}/build/libs/app.jar"

      - name: Set up QEMU
        if: steps.detect.outputs.has_bootjar == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.detect.outputs.has_bootjar == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Compute build metadata
        if: steps.detect.outputs.has_bootjar == 'true'
        id: meta
        run: |
          set -euo pipefail
          GIT_SHA_SHORT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(grep -E '^version\s*=' gradle.properties | head -n1 | cut -d= -f2 | tr -d ' ' || true)"
            VERSION="${VERSION:-0.0.0-SNAPSHOT}"
          fi
          echo "git_sha_short=${GIT_SHA_SHORT}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${BUILD_DATE}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Docker metadata (tags & labels)
        if: steps.detect.outputs.has_bootjar == 'true'
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.git_sha_short }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          labels: |
            org.opencontainers.image.title=ftgo-${{ matrix.service }}
            org.opencontainers.image.description=FTGO ${{ matrix.service }} microservice
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Log in to GHCR
        if: steps.detect.outputs.has_bootjar == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load for scanning)
        if: steps.detect.outputs.has_bootjar == 'true'
        id: build_local
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/docker/Dockerfile
          load: true
          tags: ftgo-${{ matrix.service }}:scan
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            SERVICE_VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ steps.meta.outputs.git_sha_short }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            JAR_PATH=services/${{ matrix.service }}/build/libs/app.jar
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Verify image size < 200MB
        if: steps.detect.outputs.has_bootjar == 'true'
        run: |
          set -euo pipefail
          SIZE_BYTES="$(docker image inspect ftgo-${{ matrix.service }}:scan --format '{{.Size}}')"
          SIZE_MB=$(( SIZE_BYTES / 1024 / 1024 ))
          echo "Image size: ${SIZE_MB}MB"
          if (( SIZE_MB > 200 )); then
            echo "::error::Image ftgo-${{ matrix.service }} is ${SIZE_MB}MB, exceeds 200MB budget"
            exit 1
          fi

      - name: Install Trivy
        if: steps.detect.outputs.has_bootjar == 'true'
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.56.2
          trivy --version

      - name: Scan image with Trivy (SARIF for Security tab)
        if: steps.detect.outputs.has_bootjar == 'true'
        run: |
          trivy image \
            --format sarif \
            --output trivy-${{ matrix.service }}.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            ftgo-${{ matrix.service }}:scan

      - name: Upload Trivy results to GitHub Security tab
        if: steps.detect.outputs.has_bootjar == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Fail on CRITICAL vulnerabilities
        if: steps.detect.outputs.has_bootjar == 'true'
        run: |
          trivy image \
            --format table \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            ftgo-${{ matrix.service }}:scan

      - name: Push image
        if: steps.detect.outputs.has_bootjar == 'true' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            SERVICE_VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ steps.meta.outputs.git_sha_short }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            JAR_PATH=services/${{ matrix.service }}/build/libs/app.jar
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  cleanup:
    name: Prune old untagged images
    needs: build
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - consumer-service
          - order-service
          - restaurant-service
          - courier-service
    steps:
      - name: Delete untagged versions older than the 10 most recent
        uses: actions/delete-package-versions@v5
        with:
          package-name: ftgo-${{ matrix.service }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true

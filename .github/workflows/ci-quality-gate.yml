name: "CI — Quality Gate"

on:
  push:
    branches: [main, feat/microservices-migration]
    paths:
      - "services/**"
      - "libs/**"
      - "config/quality/**"
      - "build-logic/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
  pull_request:
    branches: [main, feat/microservices-migration]
    paths:
      - "services/**"
      - "libs/**"
      - "config/quality/**"
      - "build-logic/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Static Analysis & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-quality-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-quality-
            ${{ runner.os }}-gradle-

      - name: Run quality checks on microservices
        run: |
          ./gradlew \
            :consumer-service-api:check \
            :consumer-service-app:check \
            :order-service-api:check \
            :order-service-app:check \
            :restaurant-service-api:check \
            :restaurant-service-app:check \
            :courier-service-api:check \
            :courier-service-app:check \
            --continue

      - name: Upload Checkstyle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: |
            **/build/reports/checkstyle/
          retention-days: 7

      - name: Upload PMD reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-reports
          path: |
            **/build/reports/pmd/
          retention-days: 7

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: |
            **/build/reports/spotbugs/
          retention-days: 7

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            **/build/reports/jacoco/
          retention-days: 7

  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    if: |
      secrets.SONAR_TOKEN != '' &&
      (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: ftgo
          MYSQL_USER: mysqluser
          MYSQL_PASSWORD: mysqlpw
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-sonar-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-sonar-
            ${{ runner.os }}-gradle-

      - name: Apply SonarQube plugin
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/sonar.gradle <<'INITSCRIPT'
          initscript {
              repositories { mavenCentral() }
              dependencies {
                  classpath 'org.sonarsource.scanner.gradle:sonarqube-gradle-plugin:5.0.0.4638'
              }
          }
          allprojects {
              apply plugin: org.sonarqube.gradle.SonarQubePlugin
          }
          INITSCRIPT
          sed -i 's/^          //' ~/.gradle/init.d/sonar.gradle

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./gradlew build sonar \
            -Dsonar.projectKey=ftgo-monolith \
            -Dsonar.projectName='FTGO Platform' \
            -Dsonar.organization=${SONAR_ORGANIZATION:-mbatchelor81} \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.coverage.jacoco.xmlReportPaths='**/build/reports/jacoco/test/jacocoTestReport.xml' \
            -Dsonar.exclusions='**/generated/**,**/build/**' \
            -Dsonar.coverage.exclusions='**/config/**,**/dto/**,**/exception/**,**/*Application.java' \
            -Dsonar.qualitygate.wait=true \
            -x :ftgo-end-to-end-tests:test \
            -x :ftgo-end-to-end-tests-common:build \
            -x :ftgo-application:compileTestJava \
            -x :ftgo-application:test \
            --info

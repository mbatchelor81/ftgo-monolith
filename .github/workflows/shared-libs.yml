name: Shared Libraries CI

on:
  push:
    branches: [ main, feat/microservices-migration ]
    paths:
      - 'shared/**'
      - 'build-logic/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
  pull_request:
    branches: [ main, feat/microservices-migration ]
    paths:
      - 'shared/**'
      - 'build-logic/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'

permissions:
  contents: read

jobs:
  build-shared-libs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - shared-ftgo-common
          - shared-ftgo-common-jpa
          - shared-ftgo-domain
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/feat/microservices-migration' }}

      - name: Build ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.module }}
          path: ${{ matrix.module }}/build/reports/tests/
          retention-days: 14

name: "CI — Docker Build & Push"

on:
  push:
    branches: [main]
    paths:
      - "services/*/Dockerfile"
      - "services/**"
      - "libs/**"
      - "ftgo-common/**"
      - "ftgo-common-jpa/**"
      - "ftgo-domain/**"
      - "common-swagger/**"
      - "build-logic/**"
      - "buildSrc/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - ".github/workflows/ci-docker-build.yml"
  pull_request:
    branches: [main, feat/microservices-migration]
    paths:
      - "services/*/Dockerfile"
      - "services/**"
      - "libs/**"
      - "ftgo-common/**"
      - "ftgo-common-jpa/**"
      - "ftgo-domain/**"
      - "common-swagger/**"
      - "build-logic/**"
      - "buildSrc/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - ".github/workflows/ci-docker-build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ftgo

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services have changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed services
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            # On merge to main, build all services
            echo 'services=["consumer-service","order-service","restaurant-service","courier-service"]' >> "$GITHUB_OUTPUT"
          else
            # On PR, detect changes
            CHANGED_SERVICES="[]"
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"

            SERVICES=("consumer-service" "order-service" "restaurant-service" "courier-service")
            CHANGED=()

            for svc in "${SERVICES[@]}"; do
              if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qE "^services/${svc}/|^libs/|^ftgo-common|^ftgo-domain|^build-logic/|^common-swagger/"; then
                CHANGED+=("\"${svc}\"")
              fi
            done

            if [ ${#CHANGED[@]} -eq 0 ]; then
              echo 'services=[]' >> "$GITHUB_OUTPUT"
            else
              JOINED=$(IFS=,; echo "${CHANGED[*]}")
              echo "services=[${JOINED}]" >> "$GITHUB_OUTPUT"
            fi
          fi

  # ---------------------------------------------------------------------------
  # Build, scan, and push Docker images
  # ---------------------------------------------------------------------------
  build-and-push:
    name: "Build — ${{ matrix.service }}"
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # Summary gate
  # ---------------------------------------------------------------------------
  docker-build-status:
    name: Docker Build Status
    if: always()
    needs: [changes, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Check build results
        run: |
          if [[ "${{ needs.changes.outputs.services }}" == "[]" ]]; then
            echo "No services changed — skipping Docker builds."
            exit 0
          fi
          if [[ "${{ needs.build-and-push.result }}" == "failure" ]]; then
            echo "One or more Docker builds failed."
            exit 1
          fi
          echo "All Docker builds succeeded."

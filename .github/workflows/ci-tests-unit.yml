name: "CI — Unit Tests"

on:
  push:
    branches: [main, feat/microservices-migration]
    paths:
      - "ftgo-common/**"
      - "ftgo-common-jpa/**"
      - "ftgo-domain/**"
      - "ftgo-order-service/**"
      - "ftgo-order-service-api/**"
      - "ftgo-consumer-service/**"
      - "ftgo-consumer-service-api/**"
      - "ftgo-restaurant-service/**"
      - "ftgo-restaurant-service-api/**"
      - "ftgo-courier-service/**"
      - "ftgo-courier-service-api/**"
      - "ftgo-test-util/**"
      - "common-swagger/**"
      - "libs/**"
      - "services/**"
      - "build-logic/**"
      - "buildSrc/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - ".github/workflows/ci-tests-unit.yml"
  pull_request:
    branches: [main, feat/microservices-migration]
    paths:
      - "ftgo-common/**"
      - "ftgo-common-jpa/**"
      - "ftgo-domain/**"
      - "ftgo-order-service/**"
      - "ftgo-order-service-api/**"
      - "ftgo-consumer-service/**"
      - "ftgo-consumer-service-api/**"
      - "ftgo-restaurant-service/**"
      - "ftgo-restaurant-service-api/**"
      - "ftgo-courier-service/**"
      - "ftgo-courier-service-api/**"
      - "ftgo-test-util/**"
      - "common-swagger/**"
      - "libs/**"
      - "services/**"
      - "build-logic/**"
      - "buildSrc/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - ".github/workflows/ci-tests-unit.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Tier 1 — Legacy monolith unit tests (Java 8 source, no external deps)
  # ---------------------------------------------------------------------------
  legacy-unit-tests:
    name: "Unit Tests — Legacy Modules"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-unit-legacy-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-unit-legacy-
            ${{ runner.os }}-gradle-

      - name: Run legacy module unit tests
        run: |
          ./gradlew \
            :ftgo-common:test \
            :ftgo-order-service:test \
            --continue

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-legacy
          path: |
            **/build/test-results/test/*.xml
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-legacy
          path: |
            **/build/reports/tests/test/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Tier 1 — Microservice library unit tests (Java 17, JUnit 5)
  # ---------------------------------------------------------------------------
  library-unit-tests:
    name: "Unit Tests — Shared Libraries"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-unit-libs-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-unit-libs-
            ${{ runner.os }}-gradle-

      - name: Run shared library unit tests
        run: |
          ./gradlew \
            :ftgo-common-lib:test \
            :ftgo-security-lib:test \
            :ftgo-metrics-lib:test \
            --continue

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-libraries
          path: |
            **/build/test-results/test/*.xml
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-libraries
          path: |
            **/build/reports/tests/test/
          retention-days: 7

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-reports-libraries
          path: |
            **/build/reports/jacoco/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Tier 1 — Microservice unit tests (Java 17, JUnit 5)
  # ---------------------------------------------------------------------------
  microservice-unit-tests:
    name: "Unit Tests — Microservices"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-unit-svc-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-unit-svc-
            ${{ runner.os }}-gradle-

      - name: Run microservice unit tests
        run: |
          ./gradlew \
            :consumer-service-api:test \
            :consumer-service-app:test \
            :order-service-api:test \
            :order-service-app:test \
            :restaurant-service-api:test \
            :restaurant-service-app:test \
            :courier-service-api:test \
            :courier-service-app:test \
            --continue

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-microservices
          path: |
            **/build/test-results/test/*.xml
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-microservices
          path: |
            **/build/reports/tests/test/
          retention-days: 7

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-reports-microservices
          path: |
            **/build/reports/jacoco/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Summary gate — all unit test jobs must pass
  # ---------------------------------------------------------------------------
  unit-tests-passed:
    name: "Unit Tests ✓"
    runs-on: ubuntu-latest
    needs: [legacy-unit-tests, library-unit-tests, microservice-unit-tests]
    if: always()

    steps:
      - name: Check unit test results
        run: |
          if [[ "${{ needs.legacy-unit-tests.result }}" == "failure" || \
                "${{ needs.library-unit-tests.result }}" == "failure" || \
                "${{ needs.microservice-unit-tests.result }}" == "failure" ]]; then
            echo "::error::One or more unit test jobs failed"
            exit 1
          fi
          echo "All unit test jobs passed"

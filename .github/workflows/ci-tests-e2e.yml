name: "CI — E2E Tests"

on:
  push:
    branches: [main, feat/microservices-migration]
  pull_request:
    branches: [main, feat/microservices-migration]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Tier 3 — End-to-end tests against the full Docker Compose stack
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: "E2E Tests — Full Stack"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-e2e-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-e2e-
            ${{ runner.os }}-gradle-

      - name: Build application JAR
        run: |
          ./gradlew :ftgo-application:assemble \
            -x test

      - name: Build Docker images
        run: docker compose build

      - name: Start full service stack
        run: |
          docker compose up -d
          echo "Waiting for services to start..."

      - name: Wait for application health
        run: |
          echo "Waiting for FTGO application to become healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/actuator/health > /dev/null 2>&1; then
              echo "Application is healthy after ${i} attempts"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Application failed to start within 60 attempts"
              docker compose logs ftgo-application
              exit 1
            fi
            sleep 5
          done

      - name: Run E2E tests
        env:
          DOCKER_HOST_IP: "127.0.0.1"
        run: |
          ./gradlew :ftgo-end-to-end-tests:test

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            ftgo-end-to-end-tests/build/test-results/test/*.xml
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: |
            ftgo-end-to-end-tests/build/reports/tests/
          retention-days: 7

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          mkdir -p docker-logs
          docker compose logs --no-color > docker-logs/docker-compose.log 2>&1

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-docker-logs
          path: docker-logs/
          retention-days: 7

      - name: Tear down services
        if: always()
        run: docker compose down -v

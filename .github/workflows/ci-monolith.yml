name: "CI — Monolith"

on:
  push:
    branches: [main, feat/microservices-migration]
    paths:
      - "ftgo-application/**"
      - "ftgo-order-service/**"
      - "ftgo-order-service-api/**"
      - "ftgo-consumer-service/**"
      - "ftgo-consumer-service-api/**"
      - "ftgo-restaurant-service/**"
      - "ftgo-restaurant-service-api/**"
      - "ftgo-courier-service/**"
      - "ftgo-courier-service-api/**"
      - "ftgo-common/**"
      - "ftgo-common-jpa/**"
      - "ftgo-domain/**"
      - "ftgo-flyway/**"
      - "common-swagger/**"
      - "ftgo-test-util/**"
      - "libs/ftgo-common-lib/**"
      - "build-logic/**"
      - "buildSrc/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
  pull_request:
    branches: [main, feat/microservices-migration]
    paths:
      - "ftgo-application/**"
      - "ftgo-order-service/**"
      - "ftgo-order-service-api/**"
      - "ftgo-consumer-service/**"
      - "ftgo-consumer-service-api/**"
      - "ftgo-restaurant-service/**"
      - "ftgo-restaurant-service-api/**"
      - "ftgo-courier-service/**"
      - "ftgo-courier-service-api/**"
      - "ftgo-common/**"
      - "ftgo-common-jpa/**"
      - "ftgo-domain/**"
      - "ftgo-flyway/**"
      - "common-swagger/**"
      - "ftgo-test-util/**"
      - "libs/ftgo-common-lib/**"
      - "build-logic/**"
      - "buildSrc/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: ftgo
          MYSQL_USER: mysqluser
          MYSQL_PASSWORD: mysqlpw
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-monolith-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-monolith-
            ${{ runner.os }}-gradle-

      - name: Grant database privileges
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword -e \
            "GRANT ALL PRIVILEGES ON ftgo.* TO 'mysqluser'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;"

      - name: Run Flyway migrations
        run: ./gradlew :ftgo-flyway:flywayMigrate

      - name: Build monolith
        run: |
          ./gradlew clean build \
            -x :ftgo-end-to-end-tests:test \
            -x :ftgo-end-to-end-tests-common:build \
            -x :ftgo-application:compileTestJava \
            -x :ftgo-application:test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monolith-test-reports
          path: |
            **/build/reports/tests/
          retention-days: 7

# Grafana data source provisioning.
#
# Loaded on startup from `/etc/grafana/provisioning/datasources/` inside
# the Grafana container — see docker-compose.dev.yml for the bind mount.
# The `prometheus` service name resolves via the shared compose network.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST

# =============================================================================
# Docker Compose — Local Development
# =============================================================================
# Runs all FTGO microservices with MySQL for local development and testing.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d          # start all
#   docker compose -f docker-compose.dev.yml up mysql -d    # start MySQL only
#   docker compose -f docker-compose.dev.yml logs -f        # follow logs
#   docker compose -f docker-compose.dev.yml down -v        # stop & cleanup
#
# Registry images (after CI push):
#   FTGO_IMAGE_TAG=0.1.0-abc1234 docker compose -f docker-compose.dev.yml up -d
# =============================================================================

version: '3.8'

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - ftgo-network
  depends_on:
    mysql:
      condition: service_healthy
  environment: &common-env
    SPRING_DATASOURCE_USERNAME: mysqluser
    SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-mysqlpw}
    SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
    SPRING_FLYWAY_ENABLED: "true"
    SPRING_PROFILES_ACTIVE: local
    JAVA_TOOL_OPTIONS: "-Xmx256m"
    MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://zipkin:9411/api/v2/spans"

services:
  # ---------------------------------------------------------------------------
  # Infrastructure: MySQL
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: mysqluser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mysqlpw}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ftgo-network

  # ---------------------------------------------------------------------------
  # Microservices
  # ---------------------------------------------------------------------------
  ftgo-order-service:
    <<: *service-defaults
    image: ${FTGO_REGISTRY:-ghcr.io/mbatchelor81}/ftgo-order-service:${FTGO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/ftgo-order-service/docker/Dockerfile
    ports:
      - "8081:8080"
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo_order_service
      SPRING_APPLICATION_NAME: ftgo-order-service

  ftgo-consumer-service:
    <<: *service-defaults
    image: ${FTGO_REGISTRY:-ghcr.io/mbatchelor81}/ftgo-consumer-service:${FTGO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/ftgo-consumer-service/docker/Dockerfile
    ports:
      - "8082:8080"
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo_consumer_service
      SPRING_APPLICATION_NAME: ftgo-consumer-service

  ftgo-restaurant-service:
    <<: *service-defaults
    image: ${FTGO_REGISTRY:-ghcr.io/mbatchelor81}/ftgo-restaurant-service:${FTGO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/ftgo-restaurant-service/docker/Dockerfile
    ports:
      - "8083:8080"
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo_restaurant_service
      SPRING_APPLICATION_NAME: ftgo-restaurant-service

  ftgo-courier-service:
    <<: *service-defaults
    image: ${FTGO_REGISTRY:-ghcr.io/mbatchelor81}/ftgo-courier-service:${FTGO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: services/ftgo-courier-service/docker/Dockerfile
    ports:
      - "8084:8080"
    environment:
      <<: *common-env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo_courier_service
      SPRING_APPLICATION_NAME: ftgo-courier-service

  # ---------------------------------------------------------------------------
  # Observability: Zipkin (distributed tracing)
  # ---------------------------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin:3.4
    ports:
      - "9411:9411"
    environment:
      STORAGE_TYPE: mem
    restart: unless-stopped
    networks:
      - ftgo-network

  # ---------------------------------------------------------------------------
  # Observability: Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    restart: unless-stopped
    networks:
      - ftgo-network

  # ---------------------------------------------------------------------------
  # Observability: Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ftgo-red-metrics.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ftgo-network

# ---------------------------------------------------------------------------
# Volumes & Networks
# ---------------------------------------------------------------------------
volumes:
  mysql-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  ftgo-network:
    driver: bridge

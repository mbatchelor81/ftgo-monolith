# -----------------------------------------------------------------------
# FTGO Fluentd — local docker-compose dev pipeline
# -----------------------------------------------------------------------
# Accepts forwarded log events on port 24224 (configure services with
# `logging.driver: fluentd` in compose), parses their JSON payload, and
# ships to the local Elasticsearch container.
#
# The richer Kubernetes-aware config lives at
# deployment/kubernetes/logging/fluentd-configmap.yaml.
# -----------------------------------------------------------------------

<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<filter ftgo.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  emit_invalid_record_to_error false
  <parse>
    @type json
    time_key "@timestamp"
    time_type string
    time_format "%Y-%m-%dT%H:%M:%S.%L%z"
    keep_time_key true
  </parse>
</filter>

<match ftgo.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  scheme http
  logstash_format true
  logstash_prefix ftgo-logs
  include_timestamp true
  type_name _doc
  suppress_type_name true
  <buffer>
    @type file
    path /tmp/fluentd-buffers/ftgo.buffer
    flush_interval 5s
    retry_forever false
    retry_max_interval 30
  </buffer>
</match>

# Fallback: anything not tagged ftgo.* goes to stdout for debugging.
<match **>
  @type stdout
</match>

# =============================================================================
# Fluentd Configuration for FTGO Microservices
# =============================================================================

# Accept logs from Docker containers via fluentd logging driver
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# Parse JSON-structured logs from FTGO services
<filter ftgo.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%dT%H:%M:%S.%L%z
  </parse>
</filter>

# Add environment tag
<filter ftgo.**>
  @type record_transformer
  <record>
    environment "#{ENV['FTGO_ENVIRONMENT'] || 'dev'}"
  </record>
</filter>

# Output to Elasticsearch
<match ftgo.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix ftgo-logs
  logstash_dateformat %Y.%m.%d
  include_tag_key true
  type_name _doc
  tag_key @log_name
  flush_interval 5s
  <buffer>
    flush_interval 5s
    chunk_limit_size 2M
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>

# Catch-all for non-FTGO logs
<match **>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix other-logs
  logstash_dateformat %Y.%m.%d
  flush_interval 10s
</match>

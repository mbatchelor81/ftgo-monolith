# =============================================================================
# Fluentd Configuration — FTGO Local Development
# =============================================================================
# Collects JSON logs from FTGO microservices via the forward protocol
# and ships them to Elasticsearch for indexing and search.
# =============================================================================

# ---------------------------------------------------------------------------
# Input: Accept logs via Fluentd forward protocol (port 24224)
# Services send logs here via Docker fluentd log driver or direct forwarding
# ---------------------------------------------------------------------------
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# ---------------------------------------------------------------------------
# Filter: Parse JSON log messages from FTGO services
# ---------------------------------------------------------------------------
<filter ftgo.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  <parse>
    @type json
    time_key @timestamp
    time_format %Y-%m-%dT%H:%M:%S.%L%Z
    keep_time_key true
  </parse>
</filter>

# ---------------------------------------------------------------------------
# Filter: Add Kubernetes-like metadata for local dev parity
# ---------------------------------------------------------------------------
<filter ftgo.**>
  @type record_transformer
  <record>
    environment local
    cluster ftgo-local
  </record>
</filter>

# ---------------------------------------------------------------------------
# Output: Send to Elasticsearch
# ---------------------------------------------------------------------------
<match ftgo.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  scheme http
  logstash_format true
  logstash_prefix ftgo-logs
  logstash_dateformat %Y.%m.%d
  include_tag_key true
  tag_key fluentd_tag
  type_name _doc
  suppress_type_name true

  <buffer>
    @type file
    path /fluentd/log/buffer
    flush_interval 5s
    flush_thread_count 2
    chunk_limit_size 8m
    total_limit_size 256m
    retry_max_interval 30s
    retry_forever true
    overflow_action block
  </buffer>
</match>

# ---------------------------------------------------------------------------
# Catch-all: Log unmatched events to stdout for debugging
# ---------------------------------------------------------------------------
<match **>
  @type stdout
</match>

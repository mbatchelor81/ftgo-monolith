# ArgoCD Application CR for the dev environment.
# Apply this to the ArgoCD namespace in your management cluster:
#   kubectl apply -f application-dev.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ftgo-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ftgo
    app.kubernetes.io/environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ftgo
  source:
    repoURL: https://github.com/mbatchelor81/ftgo-monolith.git
    targetRevision: feat/microservices-migration
    path: deployment/kubernetes/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: ftgo-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

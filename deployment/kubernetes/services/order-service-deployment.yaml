apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-order-service
  labels:
    app: ftgo-order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ftgo-order-service
  template:
    metadata:
      labels:
        app: ftgo-order-service
    spec:
      containers:
        - name: ftgo-order-service
          image: ftgo-order-service:latest
          ports:
            - containerPort: 8085
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/ftgo_order_service
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-credentials
                  key: password
            - name: SERVER_PORT
              value: "8085"
            - name: RESTAURANT_SERVICE_URL
              value: http://ftgo-restaurant-service:8081
            - name: CONSUMER_SERVICE_URL
              value: http://ftgo-consumer-service:8082
            - name: DELIVERY_SERVICE_URL
              value: http://ftgo-delivery-service:8084
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ftgo-order-service
spec:
  selector:
    app: ftgo-order-service
  ports:
    - port: 8085
      targetPort: 8085
  type: ClusterIP

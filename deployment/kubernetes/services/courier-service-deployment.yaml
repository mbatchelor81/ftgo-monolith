apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-courier-service
  labels:
    app: ftgo-courier-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ftgo-courier-service
  template:
    metadata:
      labels:
        app: ftgo-courier-service
    spec:
      containers:
        - name: ftgo-courier-service
          image: ftgo-courier-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/ftgo_courier_service
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-credentials
                  key: password
            - name: SERVER_PORT
              value: "8083"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ftgo-courier-service
spec:
  selector:
    app: ftgo-courier-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP

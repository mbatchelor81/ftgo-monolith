apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ftgo-prod

resources:
  - ../../base
  - namespace.yaml
  - poddisruptionbudget.yaml

commonLabels:
  app.kubernetes.io/environment: prod

patches:
  # Prod: higher resources, 3 replicas
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/component=service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi

  # Prod: higher HPA
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20

  # Prod: larger PG storage
  - target:
      kind: StatefulSet
      name: ftgo-postgres
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 50Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi

configMapGenerator:
  - name: ftgo-consumer-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,prod
  - name: ftgo-order-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,prod
  - name: ftgo-restaurant-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,prod
  - name: ftgo-courier-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,prod

# Prod secrets MUST be provided via SealedSecret or external-secrets.
# Never commit real credentials. Use:
#   kubeseal --format yaml --cert <pub-cert> < secret.yaml > sealed-secret.yaml
# Or configure ExternalSecret CRDs pointing to AWS Secrets Manager / Vault.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ftgo-prod

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: ftgo
    patch: |
      - op: replace
        path: /metadata/name
        value: ftgo-prod
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 10
  - target:
      kind: ConfigMap
    patch: |
      - op: replace
        path: /data/TRACING_SAMPLING_RATE
        value: "0.1"

commonLabels:
  environment: prod

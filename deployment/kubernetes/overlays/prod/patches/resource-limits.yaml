apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-consumer-service
spec:
  template:
    spec:
      containers:
        - name: consumer-service
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: apps/v1

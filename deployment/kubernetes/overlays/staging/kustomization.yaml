apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ftgo-staging

resources:
  - ../../base
  - namespace.yaml

patches:
  - path: patches/replicas.yaml
  - path: patches/mysql-storage.yaml

secretGenerator:
  - name: ftgo-mysql-credentials
    behavior: replace
    literals:
      - root-password=CHANGE_ME_STAGING_ROOT_PASSWORD
      - username=mysqluser
      - password=CHANGE_ME_STAGING_MYSQL_PASSWORD

configMapGenerator:
  - name: ftgo-consumer-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,staging
  - name: ftgo-order-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,staging
  - name: ftgo-restaurant-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,staging
  - name: ftgo-courier-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,staging

commonLabels:
  environment: staging

images:
  - name: ghcr.io/mbatchelor81/ftgo-consumer-service
    newTag: latest
  - name: ghcr.io/mbatchelor81/ftgo-order-service
    newTag: latest
  - name: ghcr.io/mbatchelor81/ftgo-restaurant-service
    newTag: latest
  - name: ghcr.io/mbatchelor81/ftgo-courier-service
    newTag: latest

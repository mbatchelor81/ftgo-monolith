apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ftgo-staging

resources:
  - ../../base
  - namespace.yaml

commonLabels:
  app.kubernetes.io/environment: staging

patches:
  # Staging: moderate resources, 2 replicas (same as base)
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/component=service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  # Staging: moderate HPA
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5

  # Staging: moderate PG storage
  - target:
      kind: StatefulSet
      name: ftgo-postgres
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 10Gi

configMapGenerator:
  - name: ftgo-consumer-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,staging
  - name: ftgo-order-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,staging
  - name: ftgo-restaurant-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,staging
  - name: ftgo-courier-service-config
    behavior: merge
    literals:
      - spring-profiles=kubernetes,staging

# Staging secrets must be provided via SealedSecret or external-secrets.
# The base sealed-secret.yaml placeholder is inherited; teams must seal
# actual credentials before first deployment:
#   kubeseal --format yaml --cert <pub-cert> < secret.yaml > sealed-secret.yaml

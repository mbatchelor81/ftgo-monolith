apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: logging
  labels:
    app: fluentd
data:
  fluent.conf: |
    # -----------------------------------------------------------------------
    # FTGO Fluentd pipeline
    # -----------------------------------------------------------------------
    # Tails container stdout (already JSON from logback-ftgo.xml), enriches
    # with Kubernetes metadata, and ships to Elasticsearch under the
    # `ftgo-logs` rollover alias.
    # -----------------------------------------------------------------------

    <system>
      log_level info
      workers 2
    </system>

    # Tail every container log. The kubelet writes one file per pod under
    # /var/log/containers/<pod>_<namespace>_<container>-<id>.log
    <source>
      @type tail
      @id in_tail_container_logs
      path /var/log/containers/*.log
      pos_file /var/log/fluentd-containers.log.pos
      tag raw.kubernetes.*
      read_from_head true
      <parse>
        # containerd / CRI log lines are: "<time> <stream> <flags> <payload>"
        @type cri
      </parse>
    </source>

    # Enrich every record with pod name, namespace, labels, annotations.
    <filter kubernetes.**>
      @type kubernetes_metadata
      @id filter_kube_metadata
      skip_labels false
      skip_container_metadata false
      skip_master_url true
      skip_namespace_metadata true
    </filter>

    # Parse the application's stdout JSON (what ftgo-logging produces)
    # into structured top-level fields. If a log line isn't JSON, leave
    # it untouched so non-FTGO containers still get shipped.
    <filter kubernetes.**>
      @type parser
      @id filter_parser_json
      key_name log
      reserve_data true
      remove_key_name_field true
      emit_invalid_record_to_error false
      <parse>
        @type json
        time_key "@timestamp"
        time_type string
        time_format "%Y-%m-%dT%H:%M:%S.%L%z"
        keep_time_key true
      </parse>
    </filter>

    # Only keep FTGO namespaces (see platform/shared-infrastructure/k8s/namespaces/namespaces.yaml).
    # `logging` is included so the EFK stack's own logs are queryable in Kibana.
    <filter kubernetes.**>
      @type grep
      <regexp>
        key $.kubernetes.namespace_name
        pattern /^(default|ftgo-dev|ftgo-staging|ftgo-prod|logging)$/
      </regexp>
    </filter>

    # Ship to Elasticsearch. The `index_name` writes through the
    # `ftgo-logs` alias so the ILM retention policy (see ilm-policy.yaml)
    # rotates indices automatically.
    <match kubernetes.**>
      @type elasticsearch
      @id out_es
      @log_level info
      host elasticsearch.logging.svc.cluster.local
      port 9200
      scheme http
      logstash_format false
      index_name ftgo-logs
      include_timestamp true
      type_name _doc
      suppress_type_name true
      # Write through the rollover alias so ILM can manage the index.
      write_operation create
      reload_connections false
      reconnect_on_error true
      reload_on_failure true
      <buffer>
        @type file
        path /var/log/fluentd-buffers/kubernetes.system.buffer
        flush_mode interval
        flush_interval 5s
        flush_thread_count 2
        chunk_limit_size 16m
        queue_limit_length 512
        retry_forever false
        retry_max_interval 30
        overflow_action drop_oldest_chunk
      </buffer>
    </match>

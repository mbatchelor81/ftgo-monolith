# =============================================================================
# Kibana Deployment for FTGO log visualization
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: ftgo-logging
  labels:
    app: kibana
    app.kubernetes.io/part-of: ftgo
    app.kubernetes.io/component: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.13.0
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: ELASTICSEARCH_HOSTS
              value: '["http://elasticsearch.ftgo-logging.svc.cluster.local:9200"]'
            - name: xpack.security.enabled
              value: "false"
            - name: server.name
              value: ftgo-kibana
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: ftgo-logging
  labels:
    app: kibana
spec:
  selector:
    app: kibana
  ports:
    - port: 5601
      targetPort: 5601
      name: http
  type: ClusterIP

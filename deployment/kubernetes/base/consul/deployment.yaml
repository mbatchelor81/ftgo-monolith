apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-consul
  labels:
    app.kubernetes.io/name: ftgo-consul
    app.kubernetes.io/component: service-discovery
    app.kubernetes.io/part-of: ftgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-consul
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-consul
        app.kubernetes.io/component: service-discovery
        app.kubernetes.io/part-of: ftgo
    spec:
      containers:
        - name: consul
          image: hashicorp/consul:1.18
          args:
            - agent
            - -server
            - -bootstrap-expect=1
            - -ui
            - -client=0.0.0.0
            - -bind=0.0.0.0
          ports:
            - containerPort: 8500
              name: http
            - containerPort: 8502
              name: grpc
            - containerPort: 8600
              name: dns
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /v1/status/leader
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/status/leader
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: consul-data
              mountPath: /consul/data
      volumes:
        - name: consul-data
          emptyDir: {}

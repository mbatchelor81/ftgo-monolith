apiVersion: v1
kind: Service
metadata:
  name: ftgo-consul
  labels:
    app.kubernetes.io/name: ftgo-consul
    app.kubernetes.io/component: service-discovery
    app.kubernetes.io/part-of: ftgo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ftgo-consul
  ports:
    - name: http
      port: 8500
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 8502
      targetPort: grpc
      protocol: TCP
    - name: dns
      port: 8600
      targetPort: dns
      protocol: UDP

# -------------------------------------------------------------------
# Database credentials managed via SealedSecret (Bitnami sealed-secrets).
#
# This placeholder uses a regular Secret for local/dev bootstrapping.
# In staging and production, replace with a SealedSecret resource
# generated by:
#   kubeseal --format yaml --cert <pub-cert> < secret.yaml > sealed-secret.yaml
#
# Alternatively, use external-secrets-operator to pull from
# AWS Secrets Manager, HashiCorp Vault, or GCP Secret Manager.
# -------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: ftgo-db-credentials
  labels:
    app.kubernetes.io/name: ftgo-postgres
    app.kubernetes.io/component: database
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
# Values below are base64-encoded placeholders.
# Replace with SealedSecret or external-secrets in staging/prod.
# echo -n 'ftgo' | base64  => ZnRnbw==
data:
  postgres-user: REPLACE_VIA_SEALED_SECRET
  postgres-password: REPLACE_VIA_SEALED_SECRET

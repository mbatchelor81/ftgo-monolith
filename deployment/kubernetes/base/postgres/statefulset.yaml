apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ftgo-postgres
  labels:
    app.kubernetes.io/name: ftgo-postgres
    app.kubernetes.io/component: database
spec:
  serviceName: ftgo-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-postgres
        app.kubernetes.io/component: database
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-credentials
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ftgo-db-credentials
                  key: postgres-password
            - name: POSTGRES_MULTIPLE_DATABASES
              valueFrom:
                configMapKeyRef:
                  name: ftgo-postgres-config
                  key: databases
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: ftgo-postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init-scripts
          configMap:
            name: ftgo-postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: ftgo-postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

# ---------------------------------------------------------------------------
# Fluentd configuration for FTGO microservices (EFK stack)
#
# Collects structured JSON logs from:
#   - Docker Compose (local dev): via fluentd logging driver
#   - Kubernetes:                 via tail plugin on /var/log/containers
#
# Routes all FTGO service logs to Elasticsearch with index-per-day naming.
# ---------------------------------------------------------------------------

# ---- Source: Docker Compose (fluentd logging driver) ----------------------
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# ---- Source: Kubernetes container logs ------------------------------------
<source>
  @type tail
  path /var/log/containers/ftgo-*.log
  pos_file /var/log/fluentd-ftgo-containers.log.pos
  tag kubernetes.*
  read_from_head true
  <parse>
    @type json
    time_key time
    time_format %Y-%m-%dT%H:%M:%S.%NZ
    keep_time_key true
  </parse>
</source>

# ---- Filter: Parse nested JSON log field from container runtime wrapper ---
<filter kubernetes.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  <parse>
    @type json
  </parse>
</filter>

# ---- Filter: Add Kubernetes metadata (pod, namespace, labels) ------------
<filter kubernetes.**>
  @type record_transformer
  enable_ruby true
  <record>
    kubernetes_namespace ${record.dig("kubernetes", "namespace_name") || "unknown"}
    kubernetes_pod ${record.dig("kubernetes", "pod_name") || "unknown"}
    kubernetes_container ${record.dig("kubernetes", "container_name") || "unknown"}
  </record>
</filter>

# ---- Filter: Docker Compose — parse JSON from log field ------------------
<filter docker.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  <parse>
    @type json
  </parse>
</filter>

# ---- Output: Elasticsearch -----------------------------------------------
<match **>
  @type elasticsearch
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  logstash_format true
  logstash_prefix ftgo-logs
  logstash_dateformat %Y.%m.%d
  include_tag_key true
  type_name _doc
  # Buffering for reliability
  <buffer>
    @type file
    path /var/log/fluentd-buffers/ftgo.buffer
    flush_mode interval
    flush_interval 5s
    retry_max_interval 30s
    retry_forever true
    chunk_limit_size 8M
    queue_limit_length 64
    overflow_action block
  </buffer>
</match>

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# FTGO platform base — composes all stateful services and microservices
# into a single bundle. Environment overlays under ../overlays/{dev,staging,prod}
# layer on namespace, replica counts, images, and config patches.
resources:
  - ../../../deployment/kubernetes/stateful-services
  - ../../../services/consumer-service/k8s
  - ../../../services/order-service/k8s
  - ../../../services/courier-service/k8s
  - ../../../services/restaurant-service/k8s
  - ../../../services/api-gateway/k8s

commonLabels:
  app.kubernetes.io/part-of: ftgo
  app.kubernetes.io/managed-by: kustomize

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ftgo-dev

resources:
  - namespace.yaml
  - ../../base/mysql
  - ../../base/ftgo-order-service
  - ../../base/ftgo-consumer-service
  - ../../base/ftgo-courier-service
  - ../../base/ftgo-restaurant-service

commonLabels:
  environment: dev

commonAnnotations:
  app.kubernetes.io/environment: dev

images:
  - name: ftgo/ftgo-order-service
    newTag: dev-latest
  - name: ftgo/ftgo-consumer-service
    newTag: dev-latest
  - name: ftgo/ftgo-courier-service
    newTag: dev-latest
  - name: ftgo/ftgo-restaurant-service
    newTag: dev-latest
  - name: mysql
    newName: mysql
    newTag: "8.0"

patches:
  # Dev environment: single replica for all services
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Dev environment: lower resource limits
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
  # Dev environment: disable HPA (single replica)
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
  # Dev environment: smaller MySQL storage
  - target:
      kind: StatefulSet
      name: ftgo-mysql
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

# Dev secrets - use secretGenerator to override base secrets.
# In practice, these would be managed by external-secrets or sealed-secrets.
secretGenerator:
  - name: ftgo-mysql-secret
    behavior: replace
    literals:
      - MYSQL_ROOT_PASSWORD=dev-root-password
      - MYSQL_USER=ftgo_dev
      - MYSQL_PASSWORD=dev-password
  - name: ftgo-order-service-secret
    behavior: replace
    literals:
      - SPRING_DATASOURCE_USERNAME=ftgo_dev
      - SPRING_DATASOURCE_PASSWORD=dev-password
  - name: ftgo-consumer-service-secret
    behavior: replace
    literals:
      - SPRING_DATASOURCE_USERNAME=ftgo_dev
      - SPRING_DATASOURCE_PASSWORD=dev-password
  - name: ftgo-courier-service-secret
    behavior: replace
    literals:
      - SPRING_DATASOURCE_USERNAME=ftgo_dev
      - SPRING_DATASOURCE_PASSWORD=dev-password
  - name: ftgo-restaurant-service-secret
    behavior: replace
    literals:
      - SPRING_DATASOURCE_USERNAME=ftgo_dev
      - SPRING_DATASOURCE_PASSWORD=dev-password

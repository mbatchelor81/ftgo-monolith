apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftgo-zipkin
  labels:
    app.kubernetes.io/name: ftgo-zipkin
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: ftgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ftgo-zipkin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ftgo-zipkin
        app.kubernetes.io/component: tracing
        app.kubernetes.io/part-of: ftgo
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3.4
          ports:
            - name: http
              containerPort: 9411
              protocol: TCP
          env:
            - name: STORAGE_TYPE
              value: "mem"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'net.chrisrichardson.ftgo'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withSourcesJar()
    withJavadocJar()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

repositories {
    mavenCentral()
}

dependencies {
    api 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.5.0'
    api 'org.springframework.boot:spring-boot-starter-web:3.2.5'
    api 'org.springframework.boot:spring-boot-autoconfigure:3.2.5'
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            groupId = 'net.chrisrichardson.ftgo'
            artifactId = 'ftgo-openapi-lib'
            version = '1.0.0'

            pom {
                name = 'FTGO OpenAPI Library'
                description = 'SpringDoc OpenAPI 3.0 auto-configuration for FTGO platform services'
            }
        }
    }
    repositories {
        maven {
            name = 'local'
            url = "${rootProject.buildDir}/repo"
        }
    }
}

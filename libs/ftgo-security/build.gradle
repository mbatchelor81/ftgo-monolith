// ----------------------------------------------------------------------------
// libs/ftgo-security
// ------------------
// Shared Spring Security foundation for every FTGO microservice.
//
// Provides:
//   * Base SecurityFilterChain configuration (stateless REST APIs)
//   * CORS configuration source
//   * Security exception handlers (401/403 JSON responses)
//   * SecurityUtils helper for accessing the current authentication
//
// Applied automatically in consuming services via Spring Boot
// auto-configuration (see META-INF/spring/...AutoConfiguration.imports).
//
// Migration tracked in EM-39.
// ----------------------------------------------------------------------------

plugins {
    id 'ftgo.java-conventions'
    id 'ftgo.testing-conventions'
    id 'ftgo.publishing-conventions'
}

description = 'FTGO shared Spring Security configuration'

dependencies {
    api libs.spring.boot.starter.security
    api libs.spring.boot.starter.web
    api libs.spring.boot.starter.actuator
    // Provides the Nimbus JOSE + JWT encoder/decoder used by JwtTokenService
    // and registers Spring Security's JwtAuthenticationProvider so services
    // can act as OAuth2 Resource Servers (EM-40).
    api libs.spring.boot.starter.oauth2.resource.server

    testImplementation libs.bundles.security.testing
}

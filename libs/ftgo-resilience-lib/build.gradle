plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'net.chrisrichardson.ftgo'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withSourcesJar()
    withJavadocJar()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

repositories {
    mavenCentral()
}

dependencies {
    api 'io.github.resilience4j:resilience4j-spring-boot3:2.2.0'
    api 'io.github.resilience4j:resilience4j-circuitbreaker:2.2.0'
    api 'io.github.resilience4j:resilience4j-retry:2.2.0'
    api 'io.github.resilience4j:resilience4j-bulkhead:2.2.0'
    api 'io.github.resilience4j:resilience4j-micrometer:2.2.0'
    api 'org.springframework.boot:spring-boot-starter-actuator:3.2.5'
    api 'org.springframework.boot:spring-boot-starter-aop:3.2.5'
    implementation 'org.springframework.boot:spring-boot-autoconfigure:3.2.5'
    implementation 'org.springframework:spring-context:6.1.6'
    implementation 'io.micrometer:micrometer-core:1.12.5'

    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.2.5'
}

tasks.named('test') {
    useJUnitPlatform()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            groupId = 'net.chrisrichardson.ftgo'
            artifactId = 'ftgo-resilience-lib'
            version = '1.0.0'

            pom {
                name = 'FTGO Resilience Library'
                description = 'Resilience4j circuit breaker, retry, bulkhead, and health indicator auto-configuration for FTGO platform services'
            }
        }
    }
    repositories {
        maven {
            name = 'local'
            url = "${rootProject.buildDir}/repo"
        }
    }
}

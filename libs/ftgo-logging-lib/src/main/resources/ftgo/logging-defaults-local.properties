# FTGO Logging Defaults — local profile
# Human-readable console logging for development
ftgo.logging.enabled=true
ftgo.logging.json-enabled=false
ftgo.logging.correlation-id-enabled=true
ftgo.logging.service-name=ftgo-service

# Log levels — verbose for development
logging.level.root=INFO
logging.level.net.chrisrichardson.ftgo=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.apache=WARN

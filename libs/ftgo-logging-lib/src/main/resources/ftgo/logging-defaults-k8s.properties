# FTGO Logging Defaults — k8s (production) profile
# Structured JSON + Logstash shipping, minimal noise
ftgo.logging.enabled=true
ftgo.logging.json-enabled=true
ftgo.logging.correlation-id-enabled=true
ftgo.logging.logstash.destination=${LOGSTASH_DESTINATION:logstash:5000}

# Log levels — production: reduce noise, keep business logic visible
logging.level.root=WARN
logging.level.net.chrisrichardson.ftgo=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR
logging.level.org.apache=ERROR
logging.level.org.springframework.security=WARN

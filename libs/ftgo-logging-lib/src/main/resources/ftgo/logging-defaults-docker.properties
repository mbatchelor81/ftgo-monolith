# FTGO Logging Defaults — docker profile
# Structured JSON for containerized deployments
ftgo.logging.enabled=true
ftgo.logging.json-enabled=true
ftgo.logging.correlation-id-enabled=true

# Log levels — balanced for staging/integration
logging.level.root=INFO
logging.level.net.chrisrichardson.ftgo=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.apache=WARN

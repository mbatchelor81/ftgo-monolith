# Default security properties for FTGO services.
# Services can override these in their own application.yml.

ftgo.security.enabled=true
ftgo.security.public-paths[0]=/actuator/health
ftgo.security.public-paths[1]=/actuator/health/**
ftgo.security.public-paths[2]=/actuator/info

ftgo.security.cors.allowed-origins[0]=*
ftgo.security.cors.allowed-methods[0]=GET
ftgo.security.cors.allowed-methods[1]=POST
ftgo.security.cors.allowed-methods[2]=PUT
ftgo.security.cors.allowed-methods[3]=DELETE
ftgo.security.cors.allowed-methods[4]=PATCH
ftgo.security.cors.allowed-methods[5]=OPTIONS
ftgo.security.cors.allowed-headers[0]=*
ftgo.security.cors.allow-credentials=false
ftgo.security.cors.max-age=3600

// =============================================================================
// ftgo-tracing-lib — Shared distributed tracing configuration library
// =============================================================================
// Provides Micrometer Tracing with Brave bridge and Zipkin reporter for all
// FTGO microservices. Replaces the deprecated Spring Cloud Sleuth stack.
//
// Features:
//   - Auto-configured Brave tracer with Zipkin export
//   - W3C Trace Context and B3 propagation support
//   - Structured logging with traceId/spanId via MDC
//   - @Traced annotation for custom business operation spans
//
// Usage in a service build.gradle:
//   implementation project(":shared:ftgo-tracing-lib")
// =============================================================================

plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.testing-conventions'
}

// This is a library — disable Spring Boot's fat-jar packaging
bootJar { enabled = false }
jar { enabled = true }

dependencies {
    // Spring Boot starters
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-aop'

    // Micrometer Tracing with Brave bridge
    implementation libs.bundles.tracing

    // Annotation processor
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'

    // Test dependencies
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation libs.junit.jupiter
    testImplementation libs.mockito.core
    testImplementation libs.mockito.junit.jupiter
    testImplementation libs.assertj.core
}

plugins {
    id 'ftgo.java-conventions'
    id 'ftgo.testing-conventions'
    id 'ftgo.publishing-conventions'
}

group = 'com.ftgo'
version = '1.0.0'

dependencies {
    api libs.spring.boot.starter.actuator
    api libs.micrometer.tracing.bridge.brave
    api libs.zipkin.reporter.brave
    api libs.zipkin.sender.urlconnection

    // For RestTemplate/WebClient trace propagation
    implementation libs.spring.boot.starter.web
}

publishing {
    publications {
        mavenJava {
            groupId = 'com.ftgo'
            artifactId = 'ftgo-tracing-lib'

            pom {
                name = 'FTGO Tracing Library'
                description = 'Shared Micrometer Tracing configuration with Brave/Zipkin for FTGO microservices'
            }
        }
    }
}

// common-swagger — Shared OpenAPI/Swagger configuration
// Migrated from monolith module: common-swagger
// Upgraded from Springfox to Springdoc-OpenAPI for Spring Boot 3.x compatibility

plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.publishing-conventions'
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation libs.springdoc.openapi.starter.webmvc.ui
}

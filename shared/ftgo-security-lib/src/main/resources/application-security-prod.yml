# =============================================================================
# FTGO Security — Production security profile
# =============================================================================
# Activate with: spring.profiles.active=security,security-prod
#
# Tightens security settings for production deployments.
# =============================================================================

ftgo:
  security:
    cors:
      # MUST be set to specific domains in production
      allowed-origins: ${FTGO_CORS_ALLOWED_ORIGINS:https://ftgo.example.com}
      allow-credentials: true

    logging:
      enabled: true

    jwt:
      enabled: true
      # MUST be set via environment variable — never hardcode in production
      secret: ${FTGO_JWT_SECRET}
      expiration: 1800
      refresh-expiration: 86400
      issuer: ftgo-platform

spring:
  security:
    user:
      # Production credentials MUST be set via environment variables
      name: ${FTGO_SECURITY_USER:}
      password: ${FTGO_SECURITY_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

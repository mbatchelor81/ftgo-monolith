# =============================================================================
# FTGO Security — Default security profile configuration
# =============================================================================
# Activate this profile by adding 'security' to spring.profiles.active:
#   spring.profiles.active=security
#
# Services can override any property in their own application.yml.
# =============================================================================

ftgo:
  security:
    # URL patterns accessible without authentication
    public-paths:
      - /actuator/health
      - /actuator/info
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html

    # Security audit logging
    logging:
      enabled: true

    # JWT authentication configuration
    jwt:
      enabled: false
      # Secret MUST be set via environment variable: FTGO_JWT_SECRET
      # Minimum 32 characters (256 bits) for HMAC-SHA256
      secret: ${FTGO_JWT_SECRET:}
      # Access token expiration in seconds (default: 30 minutes)
      expiration: 1800
      # Refresh token expiration in seconds (default: 24 hours)
      refresh-expiration: 86400
      # Token issuer claim
      issuer: ftgo-platform

    # CORS configuration
    cors:
      allowed-origins: "*"
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allowed-headers: Authorization,Content-Type,X-Requested-With,Accept,Origin
      allow-credentials: false
      max-age: 3600

# Spring Security defaults for stateless API services
spring:
  security:
    user:
      # Default credentials for development only — override in production
      name: ftgo-service
      password: '{noop}changeme'
      roles: SERVICE

# Actuator endpoint security
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

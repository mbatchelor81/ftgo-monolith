// =============================================================================
// ftgo-security-lib — Shared Spring Security configuration library
// Version: 1.0.0
// Package: com.ftgo.security
//
// Provides base SecurityFilterChain configuration, CORS filter,
// security exception handlers, actuator endpoint security,
// and utility classes for all FTGO microservices.
// =============================================================================

plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.testing-conventions'
    id 'ftgo.publishing-conventions'
    id 'java-library'
}

version = '1.0.0'
group = 'com.ftgo'

// This is a library — disable Spring Boot's fat-jar packaging
if (plugins.hasPlugin('org.springframework.boot')) {
    bootJar { enabled = false }
    jar { enabled = true }
}

jar {
    enabled = true
    manifest {
        attributes(
            'Implementation-Title': 'ftgo-security-lib',
            'Implementation-Version': version
        )
    }
}

dependencies {
    // Spring Security — exposed as api so consumers can use @PreAuthorize, PermissionEvaluator, etc.
    api libs.spring.boot.starter.security
    implementation libs.spring.boot.starter.web
    implementation libs.spring.boot.starter.actuator

    // JWT (jjwt)
    implementation libs.jjwt.api
    runtimeOnly libs.jjwt.impl
    runtimeOnly libs.jjwt.jackson

    // Jackson for JSON error responses
    implementation libs.jackson.databind

    // SLF4J for logging
    implementation libs.slf4j.api

    // Test dependencies
    testImplementation libs.spring.security.test
    testImplementation libs.spring.boot.starter.test
    testImplementation libs.jjwt.impl
    testImplementation libs.jjwt.jackson
}

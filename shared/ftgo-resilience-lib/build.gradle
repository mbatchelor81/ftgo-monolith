// =============================================================================
// ftgo-resilience-lib — Shared resilience configuration library
// =============================================================================
// Provides Resilience4j patterns (circuit breaker, retry, bulkhead, rate limiter),
// custom health indicators, Kubernetes-native service discovery, and graceful
// shutdown configuration for all FTGO microservices.
//
// Usage in a service build.gradle:
//   implementation project(":shared:ftgo-resilience-lib")
// =============================================================================

plugins {
    id 'ftgo.spring-boot-conventions'
    id 'ftgo.testing-conventions'
}

// This is a library — disable Spring Boot's fat-jar packaging
bootJar { enabled = false }
jar { enabled = true }

dependencies {
    // Spring Boot starters
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-aop'

    // Resilience4j
    implementation libs.bundles.resilience4j

    // Observability
    implementation libs.micrometer.prometheus

    // Annotation processor
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'

    // Test dependencies
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation libs.junit.jupiter
    testImplementation libs.mockito.core
    testImplementation libs.mockito.junit.jupiter
    testImplementation libs.assertj.core
}

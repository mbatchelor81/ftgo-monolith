# ============================================================================
# FTGO Resilience Library — Default Configuration
# ============================================================================
# Services that depend on ftgo-resilience-lib inherit these defaults.
# Override per-service in each service's application.yml as needed.
# ============================================================================

# ---------------------------------------------------------------------------
# Actuator & Health Probes
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents,retries,retryevents,bulkheads
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,diskSpace
        liveness:
          include: livenessState
  health:
    circuitbreakers:
      enabled: true
    diskspace:
      enabled: true
    db:
      enabled: true

# ---------------------------------------------------------------------------
# Resilience4j Circuit Breaker
# ---------------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.ConnectException
          - org.springframework.web.client.HttpServerErrorException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException

  # ---------------------------------------------------------------------------
  # Retry
  # ---------------------------------------------------------------------------
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.ConnectException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException

  # ---------------------------------------------------------------------------
  # Bulkhead (Thread Pool Isolation)
  # ---------------------------------------------------------------------------
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 25
        maxWaitDuration: 500ms

  # ---------------------------------------------------------------------------
  # Rate Limiter
  # ---------------------------------------------------------------------------
  ratelimiter:
    configs:
      default:
        limitForPeriod: 50
        limitRefreshPeriod: 1s
        timeoutDuration: 0

  # ---------------------------------------------------------------------------
  # Time Limiter
  # ---------------------------------------------------------------------------
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s

# ---------------------------------------------------------------------------
# Graceful Shutdown
# ---------------------------------------------------------------------------
server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
